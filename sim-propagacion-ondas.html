<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propagación de Ondas | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 18px; border-radius: 15px; height: fit-content; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .freq-box { background: rgba(0,212,255,0.05); border: 1px solid var(--cyan); padding: 10px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 14px; border-radius: 8px; font-size: 0.7rem; line-height: 1.9; white-space: pre-line; }
        .controls { margin-top: 14px; }
        .control-group { margin-bottom: 14px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #00ff7f; cursor: pointer; }

        .mode-label { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 6px; display: block; }
        .shape-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
        .shape-btn {
            background: rgba(0,255,127,0.05); border: 1px solid var(--border);
            color: var(--gray); font-family: 'Space Mono'; font-size: 0.6rem;
            padding: 7px 4px; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .shape-btn:hover { border-color: #00ff7f; color: var(--white); }
        .shape-btn.active { background: rgba(0,255,127,0.18); color: #00ff7f; border-color: #00ff7f; font-weight: bold; }

        .right-col { display: flex; flex-direction: column; gap: 12px; }
        canvas { background: #000; border-radius: 10px; border: 1px solid #1a2a4a; display: block; width: 100%; }
        #canWave { height: 300px; }
        #canXT   { height: 200px; }

        .ref-block { font-family: 'Space Mono'; font-size: 0.6rem; color: var(--gray); line-height: 2.0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Propagación de Ondas — El Problema de las Dos Fotografías</h1>

    <div class="panel-left">
        <div id="infoDisplay" class="freq-box">v = (x₁−x₀)/t₁ = ---\nY(x,t) = f(x−x₀−vt)</div>

        <div class="controls">
            <div class="control-group">
                <label>x₀ (pico en t=0) <span><span id="x0Val">2.0</span></span></label>
                <input type="range" id="x0Slider" min="0.5" max="8.0" step="0.5" value="2.0">
            </div>
            <div class="control-group">
                <label>x₁ (pico en t=t₁) <span><span id="x1Val">10.0</span></span></label>
                <input type="range" id="x1Slider" min="2.0" max="18.0" step="0.5" value="10.0">
            </div>
            <div class="control-group">
                <label style="color:#ffdd00;">t₁ (tiempo 2ª foto) <span><span id="t1Val">4.0</span> s</span></label>
                <input type="range" id="t1Slider" min="0.5" max="10.0" step="0.5" value="4.0" style="accent-color:#ffdd00;">
            </div>
            <div class="control-group">
                <label>Ancho del pulso σ <span><span id="sigVal">1.0</span></span></label>
                <input type="range" id="sigSlider" min="0.2" max="3.0" step="0.1" value="1.0" style="accent-color:#ff44ff;">
            </div>
        </div>

        <span class="mode-label">Forma del pulso f(ξ)</span>
        <div class="shape-options">
            <button class="shape-btn active" data-shape="gauss">Gaussiano</button>
            <button class="shape-btn" data-shape="tri">Triángulo</button>
            <button class="shape-btn" data-shape="rect">Rect</button>
            <button class="shape-btn" data-shape="sine">Sinusoidal</button>
        </div>

        <div class="ref-block">
            <span>Ecuación maestra:</span>
            <span style="color:#00ff7f;padding-left:6px;">Y(x,t) = f(x − x₀ − v·t)</span>
            <span style="margin-top:5px;">Velocidad:</span>
            <span style="padding-left:6px;">v = (x₁ − x₀) / t₁</span>
            <span style="margin-top:5px;">Fotos de referencia:</span>
            <span style="color:#888;padding-left:6px;">─── t = 0</span>
            <span style="color:#ffdd00;padding-left:6px;">─── t = t₁</span>
            <span style="color:#00ff7f;padding-left:6px;">─── Y(x,t) actual</span>
        </div>
    </div>

    <div class="right-col">
        <canvas id="canWave" height="300"></canvas>
        <canvas id="canXT"   height="200"></canvas>
    </div>
</div>

<script>
    const canW = document.getElementById('canWave'), ctxW = canW.getContext('2d');
    const canX = document.getElementById('canXT'),   ctxX = canX.getContext('2d');

    const L_DOMAIN = 20.0;
    const NX = 600;
    const xArr = Array.from({length: NX}, (_, i) => i / (NX - 1) * L_DOMAIN);

    let x0 = 2.0, x1 = 10.0, t1 = 4.0, sigma = 1.0;
    let shapeMode = 'gauss';
    let t = 0;
    let animRunning = true;

    // X-T diagram history
    const xtHistory = []; // {t, peakX}

    function getV() { return (x1 - x0) / t1; }

    function f(xi) {
        // xi = x - x0 - v*t  (deviation from peak)
        const s = sigma;
        const r = xi/s;
        if (shapeMode === 'gauss') return Math.exp(-(r*r));
        if (shapeMode === 'tri')   return Math.max(0, 1 - Math.abs(r));
        if (shapeMode === 'rect')  return Math.abs(xi) < s ? 1 : 0;
        if (shapeMode === 'sine')  { const c = Math.cos(r); return Math.abs(xi) < s*Math.PI ? c*c : 0; }
        return 0;
    }

    function getY(x_val, t_val) {
        return f(x_val - x0 - getV() * t_val);
    }

    // ── WAVE PANEL ───────────────────────────────────────────────────────────
    function drawWave() {
        const W = canW.width, H = canW.height;
        if (!W || !H) return;
        ctxW.clearRect(0, 0, W, H);

        const margin = {left: 44, right: 20, top: 28, bottom: 36};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const botY = margin.top + h;
        const scaleX = w / L_DOMAIN;
        const scaleY = h * 0.82;

        // Grid
        ctxW.strokeStyle = '#16203a'; ctxW.lineWidth = 1;
        ctxW.font = '9px Space Mono'; ctxW.fillStyle = '#8892b0';
        for (let xg = 0; xg <= L_DOMAIN; xg += 2) {
            const px = margin.left + xg * scaleX;
            ctxW.beginPath(); ctxW.moveTo(px, margin.top); ctxW.lineTo(px, botY); ctxW.stroke();
            ctxW.fillText(xg, px - 5, botY + 14);
        }
        ctxW.fillText('x', margin.left + w - 8, botY + 26);
        ctxW.beginPath(); ctxW.moveTo(margin.left, botY); ctxW.lineTo(margin.left + w, botY); ctxW.stroke();
        ctxW.fillText('0', margin.left - 12, botY + 4);
        ctxW.fillText('1', margin.left - 12, botY - scaleY + 4);

        // Reference: photo at t=0 (gray dashed)
        ctxW.beginPath(); ctxW.strokeStyle = '#555'; ctxW.lineWidth = 1.5; ctxW.setLineDash([5,5]);
        xArr.forEach((x, i) => {
            const px = margin.left + x * scaleX;
            const py = botY - f(x - x0) * scaleY;
            i === 0 ? ctxW.moveTo(px, py) : ctxW.lineTo(px, py);
        });
        ctxW.stroke(); ctxW.setLineDash([]);

        // Reference: photo at t=t1 (yellow dashed)
        ctxW.beginPath(); ctxW.strokeStyle = '#ffdd00'; ctxW.lineWidth = 1.5; ctxW.setLineDash([5,5]);
        xArr.forEach((x, i) => {
            const px = margin.left + x * scaleX;
            const py = botY - f(x - x1) * scaleY;
            i === 0 ? ctxW.moveTo(px, py) : ctxW.lineTo(px, py);
        });
        ctxW.stroke(); ctxW.setLineDash([]);

        // Current wave (green solid)
        ctxW.beginPath(); ctxW.strokeStyle = '#00ff7f'; ctxW.lineWidth = 3;
        ctxW.shadowBlur = 10; ctxW.shadowColor = '#00ff7f';
        xArr.forEach((x, i) => {
            const px = margin.left + x * scaleX;
            const py = botY - getY(x, t) * scaleY;
            i === 0 ? ctxW.moveTo(px, py) : ctxW.lineTo(px, py);
        });
        ctxW.stroke(); ctxW.shadowBlur = 0;

        // Peak markers (x0 and x1)
        [{ xp: x0, col: '#555', label: 't=0'}, { xp: x1, col: '#ffdd00', label: `t=${t1}s`}].forEach(({xp, col, label}) => {
            const px = margin.left + xp * scaleX;
            ctxW.strokeStyle = col; ctxW.lineWidth = 1; ctxW.setLineDash([3,4]);
            ctxW.beginPath(); ctxW.moveTo(px, margin.top); ctxW.lineTo(px, botY); ctxW.stroke();
            ctxW.setLineDash([]);
            ctxW.fillStyle = col; ctxW.font = '8px Space Mono'; ctxW.textAlign = 'center';
            ctxW.fillText(label, px, margin.top + 10);
        });

        // Current peak marker
        const xNow = x0 + getV() * t;
        const pxNow = margin.left + xNow * scaleX;
        ctxW.strokeStyle = '#00ff7f'; ctxW.lineWidth = 1; ctxW.setLineDash([2,3]);
        ctxW.beginPath(); ctxW.moveTo(pxNow, margin.top); ctxW.lineTo(pxNow, botY); ctxW.stroke();
        ctxW.setLineDash([]);
        ctxW.fillStyle = '#00ff7f'; ctxW.font = 'bold 9px Space Mono'; ctxW.textAlign = 'center';
        ctxW.fillText(`t=${t.toFixed(2)}s`, pxNow, margin.top + 10);

        // Legend
        ctxW.font = '9px Space Mono'; ctxW.textAlign = 'left';
        ctxW.fillStyle = '#555';    ctxW.fillText('─ ─  f(x−x₀)  foto t=0',   margin.left + 6, margin.top + 14);
        ctxW.fillStyle = '#ffdd00'; ctxW.fillText('─ ─  f(x−x₁)  foto t=t₁',  margin.left + 6, margin.top + 26);
        ctxW.fillStyle = '#00ff7f'; ctxW.fillText('───  Y(x,t)=f(x−x₀−vt)',   margin.left + 6, margin.top + 38);

        // Title
        ctxW.fillStyle = 'rgba(0,0,0,0.55)'; ctxW.fillRect(0, 0, W, 20);
        ctxW.fillStyle = '#00d4ff'; ctxW.font = '10px Space Mono'; ctxW.textAlign = 'center';
        ctxW.fillText(`v = (x₁−x₀)/t₁ = ${getV().toFixed(3)} m/s    t = ${t.toFixed(3)} s`, W/2, 13);
        ctxW.textAlign = 'left';
    }

    // ── X-T DIAGRAM ──────────────────────────────────────────────────────────
    function drawXT() {
        const W = canX.width, H = canX.height;
        if (!W || !H) return;
        ctxX.clearRect(0, 0, W, H);

        const margin = {left: 44, right: 20, top: 25, bottom: 35};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const T_MAX = t1 * 1.5;

        // Grid
        ctxX.strokeStyle = '#16203a'; ctxX.lineWidth = 1;
        ctxX.font = '9px Space Mono'; ctxX.fillStyle = '#8892b0';
        for (let tg = 0; tg <= T_MAX; tg += t1/2) {
            const py = margin.top + (tg/T_MAX)*h;
            ctxX.beginPath(); ctxX.moveTo(margin.left, py); ctxX.lineTo(margin.left+w, py); ctxX.stroke();
            ctxX.fillText(tg.toFixed(1)+'s', 4, py+4);
        }
        for (let xg = 0; xg <= L_DOMAIN; xg += 4) {
            const px = margin.left + (xg/L_DOMAIN)*w;
            ctxX.beginPath(); ctxX.moveTo(px, margin.top); ctxX.lineTo(px, margin.top+h); ctxX.stroke();
            ctxX.fillText(xg, px-8, margin.top+h+14);
        }
        ctxX.fillText('x', margin.left+w-8, margin.top+h+26);
        ctxX.fillText('t', 4, margin.top-6);

        // Reference points (t=0 and t=t1)
        const px0 = margin.left + (x0/L_DOMAIN)*w;
        const px1 = margin.left + (x1/L_DOMAIN)*w;
        const py0 = margin.top;
        const py1 = margin.top + (t1/T_MAX)*h;
        // World line
        ctxX.strokeStyle='rgba(0,255,127,0.3)'; ctxX.lineWidth=1.5;
        ctxX.beginPath(); ctxX.moveTo(px0-15, py0-(15/L_DOMAIN)*w*getV()/T_MAX*h);
        ctxX.lineTo(px1+(L_DOMAIN-x1)/L_DOMAIN*w, margin.top+(T_MAX/T_MAX)*h); ctxX.stroke();

        ctxX.fillStyle='#555'; ctxX.beginPath(); ctxX.arc(px0, py0, 5, 0, Math.PI*2); ctxX.fill();
        ctxX.fillStyle='#ffdd00'; ctxX.beginPath(); ctxX.arc(px1, py1, 5, 0, Math.PI*2); ctxX.fill();

        // History trail
        if (xtHistory.length > 1) {
            ctxX.beginPath(); ctxX.strokeStyle='#00ff7f'; ctxX.lineWidth=2;
            xtHistory.forEach(({ts, xp}, i) => {
                const px = margin.left + (xp/L_DOMAIN)*w;
                const py = margin.top + (ts/T_MAX)*h;
                i===0?ctxX.moveTo(px,py):ctxX.lineTo(px,py);
            });
            ctxX.stroke();
        }

        // Current point
        const xNow = x0 + getV() * t;
        const pxNow = margin.left + (xNow/L_DOMAIN)*w;
        const pyNow = margin.top + (t/T_MAX)*h;
        ctxX.beginPath(); ctxX.arc(pxNow, pyNow, 5, 0, Math.PI*2);
        ctxX.fillStyle='#00ff7f'; ctxX.shadowBlur=10; ctxX.shadowColor='#00ff7f'; ctxX.fill(); ctxX.shadowBlur=0;

        // Title
        ctxX.fillStyle='rgba(0,0,0,0.5)'; ctxX.fillRect(0,0,W,18);
        ctxX.fillStyle='#ffdd00'; ctxX.font='10px Space Mono'; ctxX.textAlign='center';
        ctxX.fillText('DIAGRAMA X-T — Trayectoria del pico', W/2, 13);
        ctxX.textAlign='left';
    }

    function updateInfoBox() {
        const v = getV();
        document.getElementById('infoDisplay').innerText =
            `x₀=${x0}  x₁=${x1}  t₁=${t1}s\nv = (x₁−x₀)/t₁ = ${v.toFixed(4)} m/s\nY(x,t) = f(x − ${x0} − ${v.toFixed(3)}·t)\nPico actual: x=${(x0+v*t).toFixed(3)}`;
    }

    function loop() {
        t += 0.04;
        const T_MAX = t1 * 1.5;
        if (t > T_MAX) { t = 0; xtHistory.length = 0; }

        const xNow = x0 + getV() * t;
        xtHistory.push({ts: t, xp: xNow});
        if (xtHistory.length > 400) xtHistory.shift();

        drawWave();
        drawXT();
        updateInfoBox();
        requestAnimationFrame(loop);
    }

    // Controls
    document.getElementById('x0Slider').oninput = e => {
        x0 = parseFloat(e.target.value);
        document.getElementById('x0Val').innerText = x0.toFixed(1);
        xtHistory.length = 0; t = 0;
    };
    document.getElementById('x1Slider').oninput = e => {
        x1 = parseFloat(e.target.value);
        document.getElementById('x1Val').innerText = x1.toFixed(1);
        xtHistory.length = 0; t = 0;
    };
    document.getElementById('t1Slider').oninput = e => {
        t1 = parseFloat(e.target.value);
        document.getElementById('t1Val').innerText = t1.toFixed(1);
        xtHistory.length = 0; t = 0;
    };
    document.getElementById('sigSlider').oninput = e => {
        sigma = parseFloat(e.target.value);
        document.getElementById('sigVal').innerText = sigma.toFixed(1);
    };
    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            shapeMode = btn.dataset.shape;
        });
    });

    function resize() {
        canW.width = canW.offsetWidth; canW.height = 300;
        canX.width = canX.offsetWidth; canX.height = 200;
    }
    window.onresize = resize;
    requestAnimationFrame(() => { resize(); loop(); });
</script>
</body>
</html>
