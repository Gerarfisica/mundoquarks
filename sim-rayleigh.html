<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Criterio de Rayleigh | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.78rem; line-height: 1.8; white-space: pre-line; }
        .btn-restart { width: 100%; padding: 12px; background: #1a6cf5; color: white; border: none; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; margin-top: 4px; }
        .btn-restart:hover { background: #ff4500; }
        .plots-column { display: flex; flex-direction: column; gap: 15px; }
        .plot-canvas { height: 180px; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Difracción de Fraunhofer — Rendija Simple — Criterio de Rayleigh</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="160"></canvas>
        <div class="controls">
            <div id="infoDisplay" class="freq-box">θ_min = ---  |  y_min = --- mm</div>

            <div class="control-group">
                <label>Ancho de rendija b <span><span id="bVal">50</span> µm</span></label>
                <input type="range" id="bSlider" min="10" max="200" step="1" value="50">
            </div>
            <div class="control-group">
                <label style="color:#00FF7F;">Longitud de onda λ <span><span id="wavVal">550</span> nm</span></label>
                <input type="range" id="wavSlider" min="380" max="750" step="1" value="550" style="accent-color:#00FF7F;">
            </div>
            <div class="control-group">
                <label>Focal f <span><span id="fVal">500</span> mm</span></label>
                <input type="range" id="fSlider" min="100" max="1000" step="10" value="500">
            </div>
        </div>
    </div>

    <div class="plots-column">
        <!-- Intensity profile -->
        <canvas id="canvasIntensity" class="plot-canvas" height="180" style="height:260px;"></canvas>
        <!-- Screen pattern -->
        <canvas id="canvasPattern" height="80" style="height:80px;"></canvas>
    </div>
</div>

<script>
    const simC    = document.getElementById('simCanvas'),        ctxS  = simC.getContext('2d');
    const canI    = document.getElementById('canvasIntensity'),  ctxI  = canI.getContext('2d');
    const canPat  = document.getElementById('canvasPattern'),    ctxPat= canPat.getContext('2d');

    let b_um = 50, wav_nm = 550, f_mm = 500;

    // wavelength → approximate RGB
    function wavToRGB(w) {
        let r, g, bl;
        if      (w < 440) { r = (440-w)/(440-380)*0.5; g = 0;             bl = 1; }
        else if (w < 490) { r = 0;                      g = (w-440)/(490-440); bl = 1; }
        else if (w < 510) { r = 0;                      g = 1;             bl = (510-w)/(510-490); }
        else if (w < 580) { r = (w-510)/(580-510);      g = 1;             bl = 0; }
        else if (w < 645) { r = 1;                      g = (645-w)/(645-580); bl = 0; }
        else              { r = 1;                      g = 0;             bl = 0; }
        return [Math.round(r*255), Math.round(g*255), Math.round(bl*255)];
    }

    function sinc(x) {
        if (Math.abs(x) < 1e-10) return 1.0;
        return Math.sin(Math.PI * x) / (Math.PI * x);
    }

    function intensity(y_m, b_m, wav_m, f_m) {
        const theta = y_m / f_m;
        const beta  = (Math.PI * b_m * Math.sin(theta)) / wav_m;
        return sinc(beta / Math.PI) ** 2;
    }

    // Draw schematic of slit setup
    function drawSchematic() {
        ctxS.clearRect(0, 0, simC.width, simC.height);
        const W = simC.width, H = simC.height;
        const b_m   = b_um * 1e-6;
        const wav_m = wav_nm * 1e-9;
        const f_m   = f_mm * 1e-3;
        const [r,g,bl] = wavToRGB(wav_nm);
        const col = `rgb(${r},${g},${bl})`;

        // Incident wave (arrows from left)
        ctxS.strokeStyle = col; ctxS.lineWidth = 1.5; ctxS.globalAlpha = 0.5;
        for (let y = 10; y < H; y += 18) {
            ctxS.beginPath();
            ctxS.moveTo(10, y); ctxS.lineTo(W*0.28, y); ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Slit (barrier)
        const slitCX = W * 0.30;
        const slitHalf = Math.min(H*0.18, 50);   // visual slit half-width
        const bPx = Math.max(4, b_um / 10);       // slit opening in px (scaled)

        ctxS.fillStyle = '#334';
        ctxS.fillRect(slitCX - 3, 0, 6, H/2 - bPx);
        ctxS.fillRect(slitCX - 3, H/2 + bPx, 6, H);

        // Slit opening highlight
        ctxS.strokeStyle = col; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.moveTo(slitCX, H/2 - bPx); ctxS.lineTo(slitCX, H/2 + bPx); ctxS.stroke();

        // Diffracted fan
        ctxS.globalAlpha = 0.25;
        for (let angle = -60; angle <= 60; angle += 8) {
            const rad = angle * Math.PI / 180;
            const lx = slitCX + Math.cos(rad) * (W * 0.65);
            const ly = H/2 + Math.sin(rad) * (W * 0.65);
            ctxS.beginPath(); ctxS.strokeStyle = col; ctxS.lineWidth = 1;
            ctxS.moveTo(slitCX, H/2); ctxS.lineTo(lx, ly); ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Lens symbol
        const lensX = W * 0.62;
        ctxS.strokeStyle = '#888'; ctxS.lineWidth = 2;
        ctxS.beginPath();
        ctxS.ellipse(lensX, H/2, 6, H*0.38, 0, 0, Math.PI*2); ctxS.stroke();

        // Screen
        const scrX = W * 0.90;
        ctxS.fillStyle = '#223';
        ctxS.fillRect(scrX - 3, 5, 6, H - 10);

        // Focal length arrow
        ctxS.strokeStyle = '#555'; ctxS.lineWidth = 1; ctxS.setLineDash([4,4]);
        ctxS.beginPath(); ctxS.moveTo(lensX, H - 12); ctxS.lineTo(scrX, H - 12); ctxS.stroke();
        ctxS.setLineDash([]);
        ctxS.fillStyle = '#8892b0'; ctxS.font = '9px Space Mono'; ctxS.textAlign = 'center';
        ctxS.fillText(`f = ${f_mm} mm`, (lensX + scrX)/2, H - 2);
        ctxS.textAlign = 'left';

        // Labels
        ctxS.fillStyle = '#8892b0'; ctxS.font = '9px Space Mono';
        ctxS.fillText(`b=${b_um}µm`, slitCX - 22, H*0.12);
        ctxS.fillStyle = col;
        ctxS.fillText(`λ=${wav_nm}nm`, slitCX + 8, H*0.12);
    }

    function drawIntensity() {
        ctxI.clearRect(0, 0, canI.width, canI.height);
        const W = canI.width, H = canI.height;
        const margin = { left: 50, right: 20, top: 25, bottom: 35 };
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;

        const b_m   = b_um  * 1e-6;
        const wav_m = wav_nm * 1e-9;
        const f_m   = f_mm  * 1e-3;
        const [r,g,bl] = wavToRGB(wav_nm);
        const col = `rgb(${r},${g},${bl})`;

        // Grid
        ctxI.strokeStyle = '#16203a'; ctxI.lineWidth = 1;
        ctxI.font = '10px Space Mono'; ctxI.fillStyle = '#8892b0';

        // Y axis (intensity 0→1)
        for (let i=0; i<=4; i++) {
            const gy = margin.top + (1 - i/4) * h;
            ctxI.beginPath(); ctxI.moveTo(margin.left, gy); ctxI.lineTo(margin.left + w, gy); ctxI.stroke();
            ctxI.fillText((i/4).toFixed(2), 2, gy + 4);
        }

        // X axis (position -20 → 20 mm)
        const xRange = 20; // mm either side
        for (let i=-4; i<=4; i++) {
            const gx = margin.left + (i/4 + 1)/2 * w;
            ctxI.beginPath(); ctxI.moveTo(gx, margin.top); ctxI.lineTo(gx, margin.top + h); ctxI.stroke();
            if (i % 2 === 0) ctxI.fillText(`${i*xRange/4}`, gx - 8, margin.top + h + 14);
        }

        ctxI.fillStyle = '#8892b0';
        ctxI.fillText('Posición (mm)', margin.left + w/2 - 40, margin.top + h + 30);
        ctxI.fillText('I/I₀', 2, margin.top - 8);

        // Title
        ctxI.fillStyle = col;
        ctxI.font = '10px Space Mono';
        ctxI.fillText(`Perfil de Intensidad — b=${b_um}µm  λ=${wav_nm}nm`, margin.left, margin.top - 8);

        // Intensity curve
        const N = 800;
        ctxI.beginPath(); ctxI.strokeStyle = col; ctxI.lineWidth = 2;

        // Fill under curve
        const pts = [];
        for (let i = 0; i <= N; i++) {
            const y_mm = -xRange + (2*xRange * i / N);
            const y_m  = y_mm * 1e-3;
            const I = intensity(y_m, b_m, wav_m, f_m);
            const px = margin.left + (y_mm + xRange) / (2*xRange) * w;
            const py = margin.top + (1 - I) * h;
            pts.push([px, py]);
        }

        // Filled area
        ctxI.beginPath();
        ctxI.moveTo(pts[0][0], margin.top + h);
        pts.forEach(([px, py]) => ctxI.lineTo(px, py));
        ctxI.lineTo(pts[pts.length-1][0], margin.top + h);
        ctxI.closePath();
        ctxI.fillStyle = `rgba(${r},${g},${bl},0.15)`;
        ctxI.fill();

        // Line
        ctxI.beginPath(); ctxI.strokeStyle = col; ctxI.lineWidth = 2;
        pts.forEach(([px,py], i) => i===0 ? ctxI.moveTo(px,py) : ctxI.lineTo(px,py));
        ctxI.stroke();

        // First minimum marker (θ = λ/b → y = f·λ/b)
        const y_min_m = f_m * wav_m / b_m;
        const y_min_mm = y_min_m * 1e3;
        const theta_min_mrad = (wav_m / b_m) * 1000;

        if (y_min_mm < xRange) {
            [y_min_mm, -y_min_mm].forEach(ym => {
                const gx = margin.left + (ym + xRange) / (2*xRange) * w;
                ctxI.strokeStyle = 'rgba(255,255,255,0.4)'; ctxI.lineWidth = 1; ctxI.setLineDash([4,4]);
                ctxI.beginPath(); ctxI.moveTo(gx, margin.top); ctxI.lineTo(gx, margin.top + h); ctxI.stroke();
                ctxI.setLineDash([]);
                ctxI.fillStyle = '#fff'; ctxI.font = '9px Space Mono';
                ctxI.fillText(`${ym > 0 ? '+' : ''}${ym.toFixed(1)}mm`, gx + 2, margin.top + 14);
            });
        }

        // Update info box
        document.getElementById('infoDisplay').innerText =
            `PRIMER MÍNIMO (Criterio Rayleigh)\nθ_min = λ/b = ${theta_min_mrad.toFixed(3)} mrad\ny_min = f·λ/b = ±${y_min_mm.toFixed(2)} mm`;
    }

    function drawPattern() {
        const W = canPat.width, H = canPat.height;
        if (!W || !H) return;
        ctxPat.clearRect(0, 0, W, H);
        const b_m   = b_um  * 1e-6;
        const wav_m = wav_nm * 1e-9;
        const f_m   = f_mm  * 1e-3;
        const [r,g,bl] = wavToRGB(wav_nm);
        const xRange = 20e-3; // 20 mm
        const N = W;

        const imageData = ctxPat.createImageData(W, H);
        for (let px = 0; px < W; px++) {
            const y_m = -xRange + (2*xRange * px / W);
            const I = intensity(y_m, b_m, wav_m, f_m);
            const rv = Math.round(r * I);
            const gv = Math.round(g * I);
            const bv = Math.round(bl * I);
            for (let py = 0; py < H; py++) {
                const idx = (py * W + px) * 4;
                imageData.data[idx]   = rv;
                imageData.data[idx+1] = gv;
                imageData.data[idx+2] = bv;
                imageData.data[idx+3] = 255;
            }
        }
        ctxPat.putImageData(imageData, 0, 0);

        // Label
        ctxPat.fillStyle = 'rgba(0,0,0,0.6)';
        ctxPat.fillRect(0, 0, 160, 16);
        ctxPat.fillStyle = '#8892b0'; ctxPat.font = '9px Space Mono';
        ctxPat.fillText('Patrón en pantalla (±20 mm)', 4, 11);
    }

    function update() {
        drawSchematic();
        drawIntensity();
        drawPattern();
    }

    document.getElementById('bSlider').oninput = e => {
        b_um = parseInt(e.target.value);
        document.getElementById('bVal').innerText = b_um;
        update();
    };
    document.getElementById('wavSlider').oninput = e => {
        wav_nm = parseInt(e.target.value);
        document.getElementById('wavVal').innerText = wav_nm;
        // Update slider accent color to match wavelength
        const [r,g,bl] = wavToRGB(wav_nm);
        e.target.style.accentColor = `rgb(${r},${g},${bl})`;
        update();
    };
    document.getElementById('fSlider').oninput = e => {
        f_mm = parseInt(e.target.value);
        document.getElementById('fVal').innerText = f_mm;
        update();
    };

    function resize() {
        simC.width  = simC.offsetWidth;
        simC.height = simC.height || 160;
        canI.width  = canI.offsetWidth;
        canI.height = 260;
        canPat.width  = canPat.offsetWidth;
        canPat.height = 80;
        update();
    }
    window.onresize = resize; resize();
</script>
</body>
</html>
