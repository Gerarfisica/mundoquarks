<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modos Normales y Acoplamiento Débil | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.78rem; line-height: 1.8; white-space: pre-line; }
        .btn-restart { width: 100%; padding: 12px; background: #1a6cf5; color: white; border: none; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; margin-top: 4px; }
        .btn-restart:hover { background: #ff4500; }
        .plots-column { display: flex; flex-direction: column; gap: 15px; }
        .plot-canvas { height: 180px; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }

        .mode-group { margin-bottom: 15px; }
        .mode-label { font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; display: block; }
        .mode-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .mode-btn {
            background: rgba(0,212,255,0.05);
            border: 1px solid var(--border);
            color: var(--gray);
            font-family: 'Space Mono';
            font-size: 0.55rem;
            padding: 7px 3px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            line-height: 1.5;
        }
        .mode-btn:hover { border-color: var(--cyan); color: var(--white); }
        .mode-btn[data-mode="fase"].active      { background: rgba(0,255,127,0.12); color: #00FF7F; border-color: #00FF7F; font-weight: bold; }
        .mode-btn[data-mode="contrafase"].active{ background: rgba(0,212,255,0.12); color: var(--cyan); border-color: var(--cyan); font-weight: bold; }
        .mode-btn[data-mode="batido"].active    { background: rgba(255,165,0,0.12); color: orange; border-color: orange; font-weight: bold; }

        .sliders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Péndulos Acoplados — Modos Normales y Acoplamiento Débil — RK4</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="260"></canvas>
        <div class="controls">
            <div id="freqDisplay" class="freq-box">ω₁ = --- rad/s  |  ω₂ = --- rad/s</div>

            <div class="mode-group">
                <span class="mode-label">Condición inicial</span>
                <div class="mode-options">
                    <button class="mode-btn" data-mode="fase">Fase<br>(Simétrico)</button>
                    <button class="mode-btn" data-mode="contrafase">Contrafase<br>(Antisimétrico)</button>
                    <button class="mode-btn active" data-mode="batido">Batido<br>(Transferencia)</button>
                </div>
            </div>

            <div class="sliders-grid">
                <div class="control-group">
                    <label>L₁ <span><span id="l1Val">2.0</span> m</span></label>
                    <input type="range" id="l1Slider" min="1.0" max="3.0" step="0.05" value="2.0">
                </div>
                <div class="control-group">
                    <label>L₂ <span><span id="l2Val">2.0</span> m</span></label>
                    <input type="range" id="l2Slider" min="1.0" max="3.0" step="0.05" value="2.0">
                </div>
                <div class="control-group">
                    <label style="color:#00FF7F;">m₁ <span><span id="m1Val">1.0</span> kg</span></label>
                    <input type="range" id="m1Slider" min="0.5" max="5.0" step="0.1" value="1.0" style="accent-color:#00FF7F;">
                </div>
                <div class="control-group">
                    <label style="color:#FFD700;">m₂ <span><span id="m2Val">1.0</span> kg</span></label>
                    <input type="range" id="m2Slider" min="0.5" max="5.0" step="0.1" value="1.0" style="accent-color:#FFD700;">
                </div>
            </div>

            <div class="control-group">
                <label style="color:orange;">Acoplamiento k <span><span id="kVal">0.5</span> N/m</span></label>
                <input type="range" id="kSlider" min="0.0" max="5.0" step="0.05" value="0.5" style="accent-color:orange;">
            </div>

            <button class="btn-restart" onclick="restart()">REINICIAR TODO</button>
        </div>
    </div>

    <div class="plots-column">
        <canvas id="canvasP" class="plot-canvas" height="180"></canvas>
        <canvas id="canvasV" class="plot-canvas" height="180"></canvas>
        <canvas id="canvasA" class="plot-canvas" height="180"></canvas>
    </div>
</div>

<script>
    const simC = document.getElementById('simCanvas'), ctxS = simC.getContext('2d');
    const canP = document.getElementById('canvasP'), ctxP = canP.getContext('2d');
    const canV = document.getElementById('canvasV'), ctxV = canV.getContext('2d');
    const canA = document.getElementById('canvasA'), ctxA = canA.getContext('2d');

    const G = 9.81;
    const T_MAX = 20.0;
    const dt = 0.016;
    const PIVOT_DIST = 1.4; // half-distance between pivots (physics units)

    let l1 = 2.0, l2 = 2.0, m1 = 1.0, m2 = 1.0, k = 0.5;
    let ya, yb, va, vb, t;
    let history = [];
    let currentMode = 'batido';

    function getAccels(ya_, yb_) {
        const aa = (-m1 * G / l1 * ya_ + k * (yb_ - ya_)) / m1;
        const ab = (-m2 * G / l2 * yb_ - k * (yb_ - ya_)) / m2;
        return [aa, ab];
    }

    function solveRK4() {
        const deriv = ([pya, pyb, pva, pvb]) => {
            const [aa, ab] = getAccels(pya, pyb);
            return [pva, pvb, aa, ab];
        };
        const s = [ya, yb, va, vb];
        const k1r = deriv(s);
        const k2r = deriv(s.map((v2, i) => v2 + 0.5*dt*k1r[i]));
        const k3r = deriv(s.map((v2, i) => v2 + 0.5*dt*k2r[i]));
        const k4r = deriv(s.map((v2, i) => v2 + dt*k3r[i]));
        [ya, yb, va, vb] = s.map((v2, i) => v2 + (dt/6)*(k1r[i] + 2*k2r[i] + 2*k3r[i] + k4r[i]));
        t += dt;
        if (t > T_MAX) { t = 0; history = []; }
        const [aa, ab] = getAccels(ya, yb);
        history.push({ t, ya, yb, va, vb, aa, ab });
    }

    function getOmegas() {
        const a11 = (m1*G/l1 + k)/m1, a12 = -k/m1;
        const a21 = -k/m2,            a22 = (m2*G/l2 + k)/m2;
        const tr = a11 + a22, det2 = a11*a22 - a12*a21;
        const disc = Math.sqrt(Math.max(0, tr*tr/4 - det2));
        return [Math.sqrt(Math.max(0, tr/2 - disc)), Math.sqrt(Math.max(0, tr/2 + disc))];
    }

    function getIC() {
        if (currentMode === 'fase')      return { ya: 0.6, yb: 0.6,  va: 0, vb: 0 };
        if (currentMode === 'contrafase') return { ya: 0.6, yb: -0.6, va: 0, vb: 0 };
        return { ya: 0.8, yb: 0.0, va: 0, vb: 0 };
    }

    // Two-curve plot with optional envelope
    function drawPlot(canvas, ctx, keyA, keyB, colorA, colorB, label, limit, showEnvelope) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const margin = { left: 40, right: 20, top: 20, bottom: 30 };
        const w = canvas.width - margin.left - margin.right;
        const h = canvas.height - margin.top - margin.bottom;
        const midY = margin.top + h/2;

        ctx.strokeStyle = '#16203a'; ctx.lineWidth = 1;
        ctx.font = '10px Space Mono'; ctx.fillStyle = '#8892b0';

        for(let i=0; i<=10; i++) {
            const gx = margin.left + (i/10)*w;
            ctx.beginPath(); ctx.moveTo(gx, margin.top); ctx.lineTo(gx, margin.top + h); ctx.stroke();
            if(i%2===0) ctx.fillText((i * T_MAX/10).toFixed(0)+'s', gx - 5, margin.top + h + 15);
        }
        ctx.fillText(limit, 5, margin.top + 5);
        ctx.fillText('0', 5, midY + 4);
        ctx.fillText('-' + limit, 5, margin.top + h);

        ctx.beginPath(); ctx.strokeStyle = '#2a3a5a';
        ctx.moveTo(margin.left, midY); ctx.lineTo(margin.left + w, midY); ctx.stroke();

        // Label legend
        ctx.fillStyle = colorA; ctx.fillText('Masa A', margin.left, margin.top - 8);
        ctx.fillStyle = colorB; ctx.fillText('Masa B', margin.left + 60, margin.top - 8);

        if (history.length < 2) return;

        const mapX = (tVal) => margin.left + (tVal / T_MAX) * w;
        const mapY = (val)  => midY - (val * (h / (limit * 2)));

        // Curve A
        ctx.beginPath(); ctx.strokeStyle = colorA; ctx.lineWidth = 2; ctx.setLineDash([]);
        history.forEach((p, i) => {
            const px = mapX(p.t), py = mapY(p[keyA]);
            if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();

        // Curve B
        ctx.beginPath(); ctx.strokeStyle = colorB; ctx.lineWidth = 2; ctx.setLineDash([5, 3]);
        history.forEach((p, i) => {
            const px = mapX(p.t), py = mapY(p[keyB]);
            if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke(); ctx.setLineDash([]);

        // Envelope (only for position graph in batido mode)
        if (showEnvelope && history.length > 5) {
            const w1 = Math.sqrt(G/l1), w2 = Math.sqrt(G/l1 + 2*k/m1);
            const ic = getIC();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([3,4]);
            ctx.beginPath();
            history.forEach((p, i) => {
                const env = ic.ya * Math.cos((w2-w1)/2 * p.t);
                const px = mapX(p.t), py = mapY(env);
                if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();
            ctx.beginPath();
            history.forEach((p, i) => {
                const env = -ic.ya * Math.cos((w2-w1)/2 * p.t);
                const px = mapX(p.t), py = mapY(env);
                if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    function drawZigzag(ctx, x0, y0, x1, y1, color) {
        const nodes = 14;
        const dx = x1-x0, dy = y1-y0;
        const len = Math.sqrt(dx*dx+dy*dy);
        if (len < 1) return;
        const px = -dy/len, py = dx/len;
        const amp = 7;
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5;
        ctx.moveTo(x0, y0);
        for(let i=1; i<nodes; i++) {
            const tt = i/nodes;
            const bx = x0+dx*tt, by = y0+dy*tt;
            const off = (i%2===0 ? amp : -amp);
            ctx.lineTo(bx+px*off, by+py*off);
        }
        ctx.lineTo(x1, y1); ctx.stroke();
    }

    function loop() {
        solveRK4();

        ctxS.clearRect(0, 0, simC.width, simC.height);
        const W = simC.width, H = simC.height;

        // Map physics → canvas
        // Physics: x in [-2, 2], y in [-3.5, 0.5]
        const physW = 4.0, physH = 4.0;
        const marginSim = 30;
        const scaleX = (W - marginSim*2) / physW;
        const scaleY = (H - marginSim*2) / physH;
        const scale = Math.min(scaleX, scaleY);

        function px(xp) { return W/2 + xp * scale; }
        function py(yp) { return marginSim + (0.5 - yp) * scale; }  // y=0 near top

        // Support bar
        const barY = py(0);
        ctxS.fillStyle = '#555';
        ctxS.fillRect(px(-PIVOT_DIST) - 6, barY - 7, px(PIVOT_DIST) - px(-PIVOT_DIST) + 12, 7);

        // Pivot dots
        [[-PIVOT_DIST/2, 0], [PIVOT_DIST/2, 0]].forEach(([xp, yp]) => {
            ctxS.beginPath();
            ctxS.arc(px(xp), py(yp), 4, 0, Math.PI*2);
            ctxS.fillStyle = '#ccc'; ctxS.fill();
        });

        // Pendulum positions (small angle: x ≈ l·sin(θ) ≈ l·(ya/l) = ya)
        const pAx = -PIVOT_DIST/2 + l1 * Math.sin(ya/l1);
        const pAy = -l1 * Math.cos(ya/l1);
        const pBx = PIVOT_DIST/2  + l2 * Math.sin(yb/l2);
        const pBy = -l2 * Math.cos(yb/l2);

        // Rods
        ctxS.beginPath(); ctxS.strokeStyle = '#8892b0'; ctxS.lineWidth = 2;
        ctxS.moveTo(px(-PIVOT_DIST/2), py(0)); ctxS.lineTo(px(pAx), py(pAy)); ctxS.stroke();
        ctxS.beginPath();
        ctxS.moveTo(px(PIVOT_DIST/2),  py(0)); ctxS.lineTo(px(pBx), py(pBy)); ctxS.stroke();

        // Spring between bobs
        drawZigzag(ctxS, px(pAx), py(pAy), px(pBx), py(pBy), 'orange');

        // Equilibrium lines (dashed)
        ctxS.save(); ctxS.setLineDash([3,5]);
        ctxS.strokeStyle = 'rgba(255,255,255,0.08)'; ctxS.lineWidth = 1;
        ctxS.beginPath(); ctxS.moveTo(px(-PIVOT_DIST/2), py(0)); ctxS.lineTo(px(-PIVOT_DIST/2), py(-l1)); ctxS.stroke();
        ctxS.beginPath(); ctxS.moveTo(px(PIVOT_DIST/2),  py(0)); ctxS.lineTo(px(PIVOT_DIST/2),  py(-l2)); ctxS.stroke();
        ctxS.restore();

        // Bob A
        ctxS.beginPath(); ctxS.arc(px(pAx), py(pAy), 14, 0, Math.PI*2);
        ctxS.fillStyle = '#00FF7F'; ctxS.shadowBlur = 18; ctxS.shadowColor = '#00FF7F';
        ctxS.fill(); ctxS.shadowBlur = 0;

        // Bob B
        ctxS.beginPath(); ctxS.arc(px(pBx), py(pBy), 14, 0, Math.PI*2);
        ctxS.fillStyle = '#FFD700'; ctxS.shadowBlur = 18; ctxS.shadowColor = '#FFD700';
        ctxS.fill(); ctxS.shadowBlur = 0;

        // Labels
        ctxS.font = '10px Space Mono'; ctxS.fillStyle = '#03050f'; ctxS.textAlign = 'center';
        ctxS.fillText('A', px(pAx), py(pAy) + 4);
        ctxS.fillText('B', px(pBx), py(pBy) + 4);
        ctxS.textAlign = 'left';

        const [w1, w2] = getOmegas();
        const ic = getIC();
        const maxP = Math.max(Math.abs(ic.ya), Math.abs(ic.yb), 0.5) * 1.6;
        const maxV = maxP * w2 * 1.3;
        const maxA = maxP * w2 * w2 * 1.3;
        const showEnv = currentMode === 'batido';

        drawPlot(canP, ctxP, 'ya', 'yb', '#00FF7F', '#FFD700', 'pos', parseFloat(maxP.toFixed(2)), showEnv);
        drawPlot(canV, ctxV, 'va', 'vb', '#00FF7F', '#FFD700', 'vel', parseFloat(maxV.toFixed(2)), false);
        drawPlot(canA, ctxA, 'aa', 'ab', '#00FF7F', '#FFD700', 'acel', parseFloat(maxA.toFixed(2)), false);

        requestAnimationFrame(loop);
    }

    function updateFreqBox() {
        const [w1, w2] = getOmegas();
        const labels = { fase: 'Modo Fase (Simétrico)', contrafase: 'Modo Contrafase (Antisimétrico)', batido: 'Batido — Transferencia de Energía' };
        document.getElementById('freqDisplay').innerText =
            `FRECUENCIAS PROPIAS\nω₁ = ${w1.toFixed(3)} rad/s  |  ω₂ = ${w2.toFixed(3)} rad/s\n${labels[currentMode]}`;
    }

    function restart() {
        const ic = getIC();
        ya = ic.ya; yb = ic.yb; va = ic.va; vb = ic.vb;
        t = 0; history = [];
        updateFreqBox();
    }

    document.getElementById('l1Slider').oninput = e => { l1 = parseFloat(e.target.value); document.getElementById('l1Val').innerText = l1.toFixed(2); restart(); };
    document.getElementById('l2Slider').oninput = e => { l2 = parseFloat(e.target.value); document.getElementById('l2Val').innerText = l2.toFixed(2); restart(); };
    document.getElementById('m1Slider').oninput = e => { m1 = parseFloat(e.target.value); document.getElementById('m1Val').innerText = m1.toFixed(1); restart(); };
    document.getElementById('m2Slider').oninput = e => { m2 = parseFloat(e.target.value); document.getElementById('m2Val').innerText = m2.toFixed(1); restart(); };
    document.getElementById('kSlider').oninput  = e => { k  = parseFloat(e.target.value); document.getElementById('kVal').innerText  = k.toFixed(2);  restart(); };

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            restart();
        });
    });

    function resize() { [simC, canP, canV, canA].forEach(c => c.width = c.offsetWidth); }
    window.onresize = resize; resize();
    restart(); loop();
</script>
</body>
</html>
