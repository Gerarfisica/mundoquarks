<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ondas Viajeras | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 18px; border-radius: 15px; height: fit-content; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .freq-box { background: rgba(0,212,255,0.05); border: 1px solid var(--cyan); padding: 10px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 14px; border-radius: 8px; font-size: 0.7rem; line-height: 1.9; white-space: pre-line; }
        .controls { margin-top: 14px; }
        .control-group { margin-bottom: 14px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }

        .mode-label { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 6px; display: block; }
        .mode-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 14px; }
        .mode-btn {
            background: rgba(0,212,255,0.05); border: 1px solid var(--border);
            color: var(--gray); font-family: 'Space Mono'; font-size: 0.65rem;
            padding: 7px 2px; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .mode-btn:hover { border-color: var(--cyan); color: var(--white); }
        .mode-btn.active { background: rgba(0,212,255,0.18); color: var(--cyan); border-color: var(--cyan); font-weight: bold; }

        /* Toggle for showing/hiding traveling waves */
        .toggle-row { display: flex; gap: 8px; margin-bottom: 14px; }
        .toggle-btn {
            flex: 1; padding: 7px 4px; border-radius: 5px; cursor: pointer;
            font-family: 'Space Mono'; font-size: 0.6rem; text-align: center; transition: 0.2s;
        }
        .toggle-btn.v1 { background: rgba(255,215,0,0.08); border: 1px solid #ffd700; color: #ffd700; }
        .toggle-btn.v1.off { background: transparent; color: #555; border-color: #333; }
        .toggle-btn.v2 { background: rgba(0,255,127,0.08); border: 1px solid #00ff7f; color: #00ff7f; }
        .toggle-btn.v2.off { background: transparent; color: #555; border-color: #333; }

        .right-col { display: flex; flex-direction: column; gap: 12px; }
        canvas { background: #000; border-radius: 10px; border: 1px solid #1a2a4a; display: block; width: 100%; }
        #canMain   { height: 300px; }
        #canPhase  { height: 180px; }

        .ref-block { font-family: 'Space Mono'; font-size: 0.6rem; color: var(--gray); line-height: 2.0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Ondas Viajeras — Estacionaria como Suma de Viajeras (Fijo-Libre)</h1>

    <div class="panel-left">
        <div id="infoDisplay" class="freq-box">n = 3\nω = ---  k = ---\nT = --- s</div>

        <span class="mode-label">Modo n</span>
        <div class="mode-options">
            <button class="mode-btn" data-n="1">1</button>
            <button class="mode-btn" data-n="2">2</button>
            <button class="mode-btn active" data-n="3">3</button>
            <button class="mode-btn" data-n="4">4</button>
            <button class="mode-btn" data-n="5">5</button>
        </div>

        <span class="mode-label">Mostrar viajeras</span>
        <div class="toggle-row">
            <button class="toggle-btn v1" id="toggleV1">→ Derecha (Y₁)</button>
            <button class="toggle-btn v2" id="toggleV2">← Izquierda (Y₂)</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Amplitud total A <span><span id="ampVal">0.008</span> m</span></label>
                <input type="range" id="ampSlider" min="0.001" max="0.02" step="0.001" value="0.008">
            </div>
            <div class="control-group">
                <label>Velocidad v <span><span id="vVal">80</span> m/s</span></label>
                <input type="range" id="vSlider" min="10" max="200" step="5" value="80" style="accent-color:#ffdd00;">
            </div>
        </div>

        <div class="ref-block">
            <span>Cuerda Fijo-Libre (n impar)</span>
            <span style="padding-left:6px;">kₙ = (2n−1)π/(2L)</span>
            <span style="padding-left:6px;">ωₙ = kₙ·v</span>
            <span style="margin-top:6px;">Descomposición:</span>
            <span style="color:#ffd700;padding-left:6px;">Y₁ = (A/2)·sin(k(x−vt))</span>
            <span style="color:#00ff7f;padding-left:6px;">Y₂ = (A/2)·sin(k(x+vt))</span>
            <span style="color:#fff;padding-left:6px;">Y = Y₁+Y₂ = A·sin(kx)·cos(ωt)</span>
        </div>
    </div>

    <div class="right-col">
        <canvas id="canMain"  height="300"></canvas>
        <canvas id="canPhase" height="180"></canvas>
    </div>
</div>

<script>
    const canMain  = document.getElementById('canMain'),  ctxM = canMain.getContext('2d');
    const canPhase = document.getElementById('canPhase'), ctxP = canPhase.getContext('2d');

    const L  = 1.0;
    const NX = 600;
    const xArr = Array.from({length: NX}, (_, i) => i / (NX - 1) * L);

    let n = 3, A_total = 0.008, v = 80.0;
    let showV1 = true, showV2 = true;
    let t = 0;

    function getParams() {
        const kn = (2*n - 1) * Math.PI / (2 * L);
        const wn = kn * v;
        const T  = 2 * Math.PI / wn;
        const Av = A_total / 2;
        return {kn, wn, T, Av};
    }

    // ── MAIN PANEL ────────────────────────────────────────────────────────────
    function drawMain() {
        const W = canMain.width, H = canMain.height;
        if (!W || !H) return;
        ctxM.clearRect(0, 0, W, H);

        const {kn, wn, Av} = getParams();
        const margin = {left: 40, right: 30, top: 28, bottom: 22};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const midY = margin.top + h / 2;
        const scaleY = h / 2 / A_total * 0.85;

        // Extremo libre dashed
        ctxM.strokeStyle = 'rgba(255,255,255,0.3)'; ctxM.lineWidth = 1.5; ctxM.setLineDash([5,5]);
        ctxM.beginPath(); ctxM.moveTo(margin.left+w, margin.top+4); ctxM.lineTo(margin.left+w, margin.top+h-4); ctxM.stroke();
        ctxM.setLineDash([]);

        // Zero axis
        ctxM.strokeStyle = 'rgba(255,255,255,0.08)'; ctxM.lineWidth = 1;
        ctxM.beginPath(); ctxM.moveTo(margin.left, midY); ctxM.lineTo(margin.left+w, midY); ctxM.stroke();

        // Fixed end (red dot)
        ctxM.fillStyle = '#ff4444'; ctxM.shadowBlur = 8; ctxM.shadowColor = '#ff4444';
        ctxM.beginPath(); ctxM.arc(margin.left, midY, 5, 0, Math.PI*2); ctxM.fill();
        ctxM.shadowBlur = 0;

        // Compute waves
        const y1 = xArr.map(x => Av * Math.sin(kn * (x - v * t)));
        const y2 = xArr.map(x => Av * Math.sin(kn * (x + v * t)));
        const yT = xArr.map((_, i) => y1[i] + y2[i]);

        function drawCurve(yArr, color, lw, dash=[]) {
            ctxM.beginPath(); ctxM.strokeStyle = color; ctxM.lineWidth = lw;
            ctxM.setLineDash(dash);
            yArr.forEach((y, i) => {
                const px = margin.left + (i/(NX-1))*w;
                const py = midY - y * scaleY;
                i === 0 ? ctxM.moveTo(px, py) : ctxM.lineTo(px, py);
            });
            ctxM.stroke(); ctxM.setLineDash([]);
        }

        // Traveling waves (dashed, behind)
        if (showV1) {
            ctxM.globalAlpha = 0.6;
            drawCurve(y1, '#ffd700', 1.8, [6,4]);
            ctxM.globalAlpha = 1;
        }
        if (showV2) {
            ctxM.globalAlpha = 0.6;
            drawCurve(y2, '#00ff7f', 1.8, [6,4]);
            ctxM.globalAlpha = 1;
        }

        // Standing wave (solid, front)
        ctxM.shadowBlur = 10; ctxM.shadowColor = '#fff';
        drawCurve(yT, '#fff', 3);
        ctxM.shadowBlur = 0;

        // Free end dot (follows wave)
        const yL = yT[NX-1];
        ctxM.strokeStyle = '#fff'; ctxM.lineWidth = 2;
        ctxM.beginPath(); ctxM.arc(margin.left+w, midY - yL*scaleY, 6, 0, Math.PI*2); ctxM.stroke();

        // Y=0 tick labels
        ctxM.fillStyle = '#8892b0'; ctxM.font = '8px Space Mono';
        ctxM.fillText('0', margin.left-12, midY+4);
        ctxM.fillText(`+A`, margin.left-18, midY - A_total*scaleY + 4);
        ctxM.fillText(`−A`, margin.left-18, midY + A_total*scaleY + 4);
        ctxM.fillText('x=0', margin.left-2, H-3);
        ctxM.fillText('x=L (libre)', margin.left+w-52, H-3);

        // Legend overlay
        ctxM.font = '9px Space Mono'; ctxM.textAlign = 'left';
        const lx = margin.left + 6, ly = margin.top + 14;
        ctxM.fillStyle = '#fff';      ctxM.fillText('─── Y = Y₁+Y₂  (estacionaria)', lx, ly);
        if (showV1) { ctxM.fillStyle = '#ffd700'; ctxM.fillText('- - - Y₁ = (A/2)·sin(k(x−vt))  →', lx, ly+14); }
        if (showV2) { ctxM.fillStyle = '#00ff7f'; ctxM.fillText('- - - Y₂ = (A/2)·sin(k(x+vt))  ←', lx, ly+28); }

        // Title
        ctxM.fillStyle = 'rgba(0,0,0,0.55)'; ctxM.fillRect(0,0,W,20);
        ctxM.fillStyle = '#00d4ff'; ctxM.font = '10px Space Mono'; ctxM.textAlign = 'center';
        ctxM.fillText(`MODO n=${n} (FIJO-LIBRE)  kₙ=${getParams().kn.toFixed(4)}  ωₙ=${getParams().wn.toFixed(4)}  v=${v}m/s`, W/2, 13);
        ctxM.textAlign = 'left';
    }

    // ── PHASE DIAGRAM ─────────────────────────────────────────────────────────
    // Shows instantaneous amplitude at x=L/4, L/2, 3L/4, L vs time (last 2 periods)
    const phaseHistory = {
        x0: [], x1: [], x2: [], x3: [], ts: []
    };
    const MAX_HIST = 300;

    function updatePhaseHistory() {
        const {kn, Av} = getParams();
        const xs = [L*0.25, L*0.5, L*0.75, L];
        const vals = xs.map(x => {
            const y1 = Av * Math.sin(kn*(x - v*t));
            const y2 = Av * Math.sin(kn*(x + v*t));
            return y1 + y2;
        });
        phaseHistory.x0.push(vals[0]);
        phaseHistory.x1.push(vals[1]);
        phaseHistory.x2.push(vals[2]);
        phaseHistory.x3.push(vals[3]);
        phaseHistory.ts.push(t);
        if (phaseHistory.ts.length > MAX_HIST) {
            ['x0','x1','x2','x3','ts'].forEach(k => phaseHistory[k].shift());
        }
    }

    function drawPhase() {
        const W = canPhase.width, H = canPhase.height;
        if (!W || !H) return;
        ctxP.clearRect(0, 0, W, H);

        const margin = {left: 44, right: 20, top: 25, bottom: 30};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const midY = margin.top + h / 2;
        const scaleY = h / 2 / A_total * 0.85;
        const N = phaseHistory.ts.length;
        if (N < 2) return;

        // Grid
        ctxP.strokeStyle = '#16203a'; ctxP.lineWidth = 1;
        ctxP.font = '9px Space Mono'; ctxP.fillStyle = '#8892b0';
        ctxP.beginPath(); ctxP.moveTo(margin.left,midY); ctxP.lineTo(margin.left+w,midY); ctxP.stroke();
        ctxP.fillText('+A', 4, midY - A_total*scaleY + 4);
        ctxP.fillText(' 0', 4, midY + 4);
        ctxP.fillText('-A', 4, midY + A_total*scaleY + 4);

        const SERIES = [
            {data: phaseHistory.x0, col: '#ff4444', label: 'x=L/4'},
            {data: phaseHistory.x1, col: '#ffdd00', label: 'x=L/2'},
            {data: phaseHistory.x2, col: '#00d4ff', label: 'x=3L/4'},
            {data: phaseHistory.x3, col: '#fff',    label: 'x=L (libre)'},
        ];

        SERIES.forEach(({data, col}) => {
            ctxP.beginPath(); ctxP.strokeStyle = col; ctxP.lineWidth = 1.5;
            data.forEach((y, i) => {
                const px = margin.left + (i/(MAX_HIST-1))*w;
                const py = midY - y * scaleY;
                i===0 ? ctxP.moveTo(px,py) : ctxP.lineTo(px,py);
            });
            ctxP.stroke();
        });

        // Legend
        let lx = margin.left + 4;
        SERIES.forEach(({col, label}) => {
            ctxP.fillStyle = col; ctxP.font = '8px Space Mono';
            ctxP.fillText(`■ ${label}`, lx, margin.top+h+18);
            lx += 90;
        });

        // Title
        ctxP.fillStyle = 'rgba(0,0,0,0.55)'; ctxP.fillRect(0,0,W,18);
        ctxP.fillStyle = '#ffdd00'; ctxP.font = '10px Space Mono'; ctxP.textAlign = 'center';
        ctxP.fillText('AMPLITUD vs TIEMPO en posiciones fijas', W/2, 13);
        ctxP.textAlign = 'left';
    }

    function updateInfoBox() {
        const {kn, wn, T, Av} = getParams();
        document.getElementById('infoDisplay').innerText =
            `n = ${n}  (Fijo-Libre)\nkₙ = (2n−1)π/2L = ${kn.toFixed(4)}\nωₙ = kₙ·v = ${wn.toFixed(4)} rad/s\nT = 2π/ω = ${T.toFixed(5)} s\nA_viajera = A/2 = ${Av.toFixed(4)} m`;
    }

    function loop() {
        const {wn, T} = getParams();
        t += 0.003;
        if (t > 2 * T) t = 0;

        updatePhaseHistory();
        drawMain();
        drawPhase();
        requestAnimationFrame(loop);
    }

    // Controls
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            n = parseInt(btn.dataset.n); t = 0;
            ['x0','x1','x2','x3','ts'].forEach(k => phaseHistory[k] = []);
            updateInfoBox();
        });
    });

    document.getElementById('toggleV1').addEventListener('click', () => {
        showV1 = !showV1;
        document.getElementById('toggleV1').classList.toggle('off', !showV1);
    });
    document.getElementById('toggleV2').addEventListener('click', () => {
        showV2 = !showV2;
        document.getElementById('toggleV2').classList.toggle('off', !showV2);
    });

    document.getElementById('ampSlider').oninput = e => {
        A_total = parseFloat(e.target.value);
        document.getElementById('ampVal').innerText = A_total.toFixed(3);
        updateInfoBox();
    };
    document.getElementById('vSlider').oninput = e => {
        v = parseFloat(e.target.value);
        document.getElementById('vVal').innerText = v;
        t = 0; ['x0','x1','x2','x3','ts'].forEach(k => phaseHistory[k] = []);
        updateInfoBox();
    };

    function resize() {
        canMain.width  = canMain.offsetWidth;  canMain.height  = 300;
        canPhase.width = canPhase.offsetWidth; canPhase.height = 180;
    }
    window.onresize = resize;
    requestAnimationFrame(() => { resize(); updateInfoBox(); loop(); });
</script>
</body>
</html>
