<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paquetes de Onda | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; gap: 24px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 18px; border-radius: 15px; height: fit-content; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .freq-box { background: rgba(0,212,255,0.05); border: 1px solid var(--cyan); padding: 10px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 14px; border-radius: 8px; font-size: 0.7rem; line-height: 1.9; white-space: pre-line; }
        .controls { margin-top: 14px; }
        .control-group { margin-bottom: 13px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #00ff7f; cursor: pointer; }

        .btn-restart { width:100%; padding:9px; background:#1a6cf5; color:#fff; border:none; font-family:'Space Mono'; font-size:0.65rem; font-weight:bold; cursor:pointer; border-radius:6px; margin-top:6px; transition:0.3s; }
        .btn-restart:hover { background:#ff4500; }

        .right-col { display:flex; flex-direction:column; gap:12px; }
        canvas { background:#000; border-radius:10px; border:1px solid #1a2a4a; display:block; width:100%; }
        #canWave { height:300px; }
        #canDx   { height:190px; }

        .ref-block { font-family:'Space Mono'; font-size:0.6rem; color:var(--gray); line-height:2.0; margin-top:10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Paquetes de Onda — Velocidad de Grupo, Fase y Dispersión</h1>

    <div class="panel-left">
        <div id="infoDisplay" class="freq-box">t = 0.00 s\nΔx = ---\nΔx·Δk = ---</div>

        <div class="controls">
            <div class="control-group">
                <label style="color:#00ff7f;">v_grupo (vg) <span><span id="vgVal">0.6</span></span></label>
                <input type="range" id="vgSlider" min="0.1" max="3.0" step="0.05" value="0.6">
            </div>
            <div class="control-group">
                <label style="color:#ff4444;">v_fase (vp) <span><span id="vpVal">1.5</span></span></label>
                <input type="range" id="vpSlider" min="0.1" max="5.0" step="0.1" value="1.5" style="accent-color:#ff4444;">
            </div>
            <div class="control-group">
                <label style="color:#ffdd00;">Dispersión GVD <span><span id="gvdVal">1.2</span></span></label>
                <input type="range" id="gvdSlider" min="0.0" max="5.0" step="0.1" value="1.2" style="accent-color:#ffdd00;">
            </div>
            <div class="control-group">
                <label>k₀ (portadora) <span><span id="k0Val">8.0</span></span></label>
                <input type="range" id="k0Slider" min="1.0" max="20.0" step="0.5" value="8.0" style="accent-color:#ff44ff;">
            </div>
            <div class="control-group">
                <label>Δk (ancho espectral) <span><span id="DkVal">1.2</span></span></label>
                <input type="range" id="DkSlider" min="0.2" max="4.0" step="0.1" value="1.2">
            </div>
            <div class="control-group">
                <label>Chirp b (fase cuad.) <span><span id="bVal">0.5</span></span></label>
                <input type="range" id="bSlider" min="0.0" max="3.0" step="0.1" value="0.5" style="accent-color:#888;">
            </div>
            <button class="btn-restart" onclick="restart()">REINICIAR</button>
        </div>

        <div class="ref-block">
            <span>Paquete Gaussiano:</span>
            <span style="padding-left:6px;color:#00ff7f;">Ψ = A(t)·exp(−(x−vg·t)²/4Δx²)·cos(k₀(x−vp·t))</span>
            <span style="margin-top:5px;">Ensanchamiento por GVD + chirp:</span>
            <span style="padding-left:6px;">Δx(t) = Δx₀·√(1+(GVD·t_eff/Δk²)²)</span>
            <span style="margin-top:5px;color:#ffdd00;">● Centro del paquete  (vg)</span>
            <span style="color:#ff4444;">● Cresta interna  (vp)</span>
        </div>
    </div>

    <div class="right-col">
        <canvas id="canWave" height="300"></canvas>
        <canvas id="canDx"   height="190"></canvas>
    </div>
</div>

<script>
    const canW = document.getElementById('canWave'), ctxW = canW.getContext('2d');
    const canD = document.getElementById('canDx'),   ctxD = canD.getContext('2d');

    const L    = 60.0;
    const NX   = 1200;
    const X0   = 5.0;   // starting position
    const xArr = Array.from({length: NX}, (_, i) => i / (NX - 1) * L);

    let vg=0.6, vp=1.5, gvd=1.2, k0=8.0, Dk=1.2, b=0.5;
    let t = 0;
    const DT = 0.08;

    // Δx(t) history
    const dxHist = [];

    function getDx0() {
        return (1 / (2 * Dk)) * Math.sqrt(1 + 16 * (b * b) * (Dk * Dk * Dk * Dk));
    }
    function getDx(t_val) {
        const t_eff = t_val + 4 * b * Dk * Dk;
        const denom = 1 / (2 * Dk * Dk);
        return (1 / (2 * Dk)) * Math.sqrt(1 + (gvd * t_eff / denom) * (gvd * t_eff / denom));
    }

    function restart() { t = 0; dxHist.length = 0; }

    // ── WAVE PANEL ───────────────────────────────────────────────────────────
    function drawWave() {
        const W = canW.width, H = canW.height;
        if (!W || !H) return;
        ctxW.clearRect(0, 0, W, H);

        const margin = {left:44, right:20, top:28, bottom:30};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const midY = margin.top + h / 2;
        const scaleX = w / L;
        const scaleY = h / 2 * 0.88;

        function mapX(xv) { return margin.left + xv * scaleX; }
        function mapY(y)  { return midY - y * scaleY; }

        // Grid
        ctxW.strokeStyle = '#16203a'; ctxW.lineWidth = 1;
        ctxW.font = '9px Space Mono'; ctxW.fillStyle = '#8892b0';
        for (let xg = 0; xg <= L; xg += 10) {
            const px = mapX(xg);
            ctxW.beginPath(); ctxW.moveTo(px, margin.top); ctxW.lineTo(px, margin.top+h); ctxW.stroke();
            ctxW.fillText(xg, px-6, margin.top+h+14);
        }
        ctxW.fillText('x', W-16, margin.top+h+14);

        // Zero axis
        ctxW.strokeStyle='rgba(255,255,255,0.08)'; ctxW.lineWidth=1;
        ctxW.beginPath(); ctxW.moveTo(margin.left,midY); ctxW.lineTo(margin.left+w,midY); ctxW.stroke();

        const dx_t = getDx(t);
        const dx0  = getDx0();
        const center = X0 + vg * t;
        const amp = Math.sqrt(dx0 / dx_t); // amplitude conservation

        // Envelope
        const envY = xArr.map(x => amp * Math.exp(-((x-center)*(x-center)) / (4*dx_t*dx_t)));
        // Wave
        const waveY = xArr.map((x, i) => envY[i] * Math.cos(k0 * (x - vp * t)));

        // Upper envelope (red dashed)
        ctxW.beginPath(); ctxW.strokeStyle='#ff4444'; ctxW.lineWidth=2; ctxW.setLineDash([6,4]);
        envY.forEach((y, i) => { const px=mapX(xArr[i]),py=mapY(y); i===0?ctxW.moveTo(px,py):ctxW.lineTo(px,py); });
        ctxW.stroke();
        // Lower envelope
        ctxW.beginPath();
        envY.forEach((y, i) => { const px=mapX(xArr[i]),py=mapY(-y); i===0?ctxW.moveTo(px,py):ctxW.lineTo(px,py); });
        ctxW.stroke(); ctxW.setLineDash([]);

        // Wave
        ctxW.beginPath(); ctxW.strokeStyle='#00ff7f'; ctxW.lineWidth=1.5; ctxW.globalAlpha=0.9;
        ctxW.shadowBlur=6; ctxW.shadowColor='#00ff7f';
        waveY.forEach((y, i) => { const px=mapX(xArr[i]),py=mapY(y); i===0?ctxW.moveTo(px,py):ctxW.lineTo(px,py); });
        ctxW.stroke(); ctxW.shadowBlur=0; ctxW.globalAlpha=1;

        // Group center dot (yellow)
        const cx = mapX(((center % L) + L) % L);
        ctxW.beginPath(); ctxW.arc(cx, midY, 8, 0, Math.PI*2);
        ctxW.fillStyle='#ffdd00'; ctxW.shadowBlur=14; ctxW.shadowColor='#ffdd00'; ctxW.fill(); ctxW.shadowBlur=0;

        // Phase crest dot (red)
        const crestX = ((vp * t + X0) % L + L) % L;
        const crestY_wave = amp * Math.exp(-((crestX-center)*(crestX-center))/(4*dx_t*dx_t)) * Math.cos(k0*(crestX-vp*t));
        const crestPx = mapX(crestX), crestPy = mapY(crestY_wave);
        ctxW.beginPath(); ctxW.arc(crestPx, crestPy, 5, 0, Math.PI*2);
        ctxW.fillStyle='#ff4444'; ctxW.shadowBlur=10; ctxW.shadowColor='#ff4444'; ctxW.fill(); ctxW.shadowBlur=0;

        // Legend
        ctxW.font='9px Space Mono'; ctxW.textAlign='left';
        ctxW.fillStyle='#00ff7f'; ctxW.fillText('─── Paquete Ψ(x,t)',     margin.left+6, margin.top+14);
        ctxW.fillStyle='#ff4444'; ctxW.fillText('- -  Envolvente ±A(t)',  margin.left+6, margin.top+26);
        ctxW.fillStyle='#ffdd00'; ctxW.fillText('●  Centro (vg)',          margin.left+6, margin.top+38);
        ctxW.fillStyle='#ff4444'; ctxW.fillText('●  Cresta (vp)',          margin.left+180, margin.top+38);

        // Title
        ctxW.fillStyle='rgba(0,0,0,0.55)'; ctxW.fillRect(0,0,W,20);
        ctxW.fillStyle='#00d4ff'; ctxW.font='10px Space Mono'; ctxW.textAlign='center';
        ctxW.fillText(`PAQUETE DE ONDA  vg=${vg.toFixed(2)}  vp=${vp.toFixed(2)}  GVD=${gvd.toFixed(2)}  Δx=${dx_t.toFixed(4)}`, W/2, 13);
        ctxW.textAlign='left';
    }

    // ── Δx(t) PANEL ──────────────────────────────────────────────────────────
    const T_HIST_MAX = 80;

    function drawDx() {
        const W = canD.width, H = canD.height;
        if (!W || !H) return;
        ctxD.clearRect(0, 0, W, H);

        const margin = {left:52, right:20, top:25, bottom:32};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;

        const maxDx = Math.max(...dxHist.map(d=>d.dx), getDx0(), 0.1) * 1.2;

        // Grid
        ctxD.strokeStyle='#16203a'; ctxD.lineWidth=1;
        ctxD.font='9px Space Mono'; ctxD.fillStyle='#8892b0';
        [0, 0.25, 0.5, 0.75, 1].forEach(f=>{
            const gy=margin.top+(1-f)*h;
            ctxD.beginPath(); ctxD.moveTo(margin.left,gy); ctxD.lineTo(margin.left+w,gy); ctxD.stroke();
            ctxD.fillText((f*maxDx).toFixed(2), 4, gy+4);
        });
        for (let tg=0; tg<=T_HIST_MAX; tg+=20){
            const px=margin.left+(tg/T_HIST_MAX)*w;
            ctxD.beginPath(); ctxD.moveTo(px,margin.top); ctxD.lineTo(px,margin.top+h); ctxD.stroke();
            ctxD.fillText(tg, px-8, margin.top+h+14);
        }
        ctxD.fillText('t (s)', margin.left+w-14, margin.top+h+26);
        ctxD.fillText('Δx(t)', 4, margin.top-6);

        // Δx₀ line
        const dx0 = getDx0();
        const y0  = margin.top + (1 - dx0/maxDx)*h;
        ctxD.strokeStyle='rgba(255,255,255,0.2)'; ctxD.lineWidth=1; ctxD.setLineDash([4,4]);
        ctxD.beginPath(); ctxD.moveTo(margin.left,y0); ctxD.lineTo(margin.left+w,y0); ctxD.stroke();
        ctxD.setLineDash([]);
        ctxD.fillStyle='rgba(255,255,255,0.4)'; ctxD.fillText(`Δx₀=${dx0.toFixed(3)}`, margin.left+4, y0-4);

        // Δx(t) curve
        if (dxHist.length > 1) {
            ctxD.beginPath(); ctxD.strokeStyle='#ffdd00'; ctxD.lineWidth=2;
            dxHist.forEach(({ts, dx}, i) => {
                const px = margin.left + (ts/T_HIST_MAX)*w;
                const py = margin.top + (1 - dx/maxDx)*h;
                i===0?ctxD.moveTo(px,py):ctxD.lineTo(px,py);
            });
            ctxD.stroke();
        }

        // Current point
        const curDx = getDx(t);
        const curPx = margin.left + (t/T_HIST_MAX)*w;
        const curPy = margin.top + (1 - curDx/maxDx)*h;
        ctxD.beginPath(); ctxD.arc(curPx, curPy, 5, 0, Math.PI*2);
        ctxD.fillStyle='#ffdd00'; ctxD.shadowBlur=10; ctxD.shadowColor='#ffdd00'; ctxD.fill(); ctxD.shadowBlur=0;

        // Title
        ctxD.fillStyle='rgba(0,0,0,0.5)'; ctxD.fillRect(0,0,W,18);
        ctxD.fillStyle='#ffdd00'; ctxD.font='10px Space Mono'; ctxD.textAlign='center';
        ctxD.fillText('ENSANCHAMIENTO Δx(t) — Principio de incerteza Δx·Δk ≥ ½', W/2, 13);
        ctxD.textAlign='left';
    }

    function updateInfoBox() {
        const dx_t = getDx(t);
        document.getElementById('infoDisplay').innerText =
            `t = ${t.toFixed(2)} s\nVel. Grupo vg = ${vg.toFixed(2)}\nVel. Fase  vp = ${vp.toFixed(2)}\nGVD (w'') = ${gvd.toFixed(2)}\nAncho Δx(t) = ${dx_t.toFixed(4)}\nΔx·Δk = ${(dx_t*Dk).toFixed(4)}`;
    }

    function loop() {
        t += DT;
        if (t > T_HIST_MAX) restart();

        dxHist.push({ts: t, dx: getDx(t)});
        if (dxHist.length > 1000) dxHist.shift();

        drawWave();
        drawDx();
        updateInfoBox();
        requestAnimationFrame(loop);
    }

    // Controls
    document.getElementById('vgSlider').oninput  = e => { vg  = parseFloat(e.target.value); document.getElementById('vgVal').innerText  = vg.toFixed(2);  restart(); };
    document.getElementById('vpSlider').oninput  = e => { vp  = parseFloat(e.target.value); document.getElementById('vpVal').innerText  = vp.toFixed(2);  restart(); };
    document.getElementById('gvdSlider').oninput = e => { gvd = parseFloat(e.target.value); document.getElementById('gvdVal').innerText = gvd.toFixed(2); restart(); };
    document.getElementById('k0Slider').oninput  = e => { k0  = parseFloat(e.target.value); document.getElementById('k0Val').innerText  = k0.toFixed(1);  restart(); };
    document.getElementById('DkSlider').oninput  = e => { Dk  = parseFloat(e.target.value); document.getElementById('DkVal').innerText  = Dk.toFixed(2);  restart(); };
    document.getElementById('bSlider').oninput   = e => { b   = parseFloat(e.target.value); document.getElementById('bVal').innerText   = b.toFixed(2);   restart(); };

    function resize() {
        canW.width = canW.offsetWidth; canW.height = 300;
        canD.width = canD.offsetWidth; canD.height = 190;
    }
    window.onresize = resize;
    requestAnimationFrame(() => { resize(); loop(); });
</script>
</body>
</html>
