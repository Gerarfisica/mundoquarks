<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Difracción Rectangular | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.78rem; line-height: 1.8; white-space: pre-line; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }

        .mode-group { margin-bottom: 15px; }
        .mode-label { font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; display: block; }
        .mode-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .mode-btn {
            background: rgba(0,212,255,0.05);
            border: 1px solid var(--border);
            color: var(--gray);
            font-family: 'Space Mono';
            font-size: 0.65rem;
            padding: 8px 4px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .mode-btn:hover { border-color: var(--cyan); color: var(--white); }
        .mode-btn[data-mode="rect"].active   { background: rgba(0,212,255,0.12); color: var(--cyan); border-color: var(--cyan); font-weight: bold; }
        .mode-btn[data-mode="circ"].active   { background: rgba(255,0,255,0.10); color: #ff88ff; border-color: #ff88ff; font-weight: bold; }

        /* Pattern canvas takes up the right column fully */
        .right-col { display: flex; flex-direction: column; gap: 10px; }
        #canvasPattern { height: 420px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Difracción 2D — Apertura Rectangular y Disco de Airy</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="160"></canvas>
        <div class="controls">
            <div id="infoDisplay" class="freq-box">Patrón de difracción de Fraunhofer</div>

            <div class="mode-group">
                <span class="mode-label">Tipo de apertura</span>
                <div class="mode-options">
                    <button class="mode-btn active" data-mode="rect">Rectangular<br>(sinc²·sinc²)</button>
                    <button class="mode-btn" data-mode="circ">Circular<br>(Disco de Airy)</button>
                </div>
            </div>

            <div class="control-group">
                <label id="labelA">Dim A — ancho <span><span id="aVal">50</span> µm</span></label>
                <input type="range" id="aSlider" min="10" max="200" step="1" value="50">
            </div>
            <div class="control-group" id="groupB">
                <label style="color:#ff88ff;">Dim B — alto <span><span id="bVal">80</span> µm</span></label>
                <input type="range" id="bSlider" min="10" max="200" step="1" value="80" style="accent-color:#ff88ff;">
            </div>
            <div class="control-group">
                <label id="wavLabel" style="color:#00ff99;">Longitud de onda λ <span><span id="wavVal">550</span> nm</span></label>
                <input type="range" id="wavSlider" min="380" max="750" step="1" value="550">
            </div>
        </div>
    </div>

    <div class="right-col">
        <canvas id="canvasPattern" height="420"></canvas>
    </div>
</div>

<script>
    const simC   = document.getElementById('simCanvas'),     ctxS   = simC.getContext('2d');
    const canPat = document.getElementById('canvasPattern'), ctxPat = canPat.getContext('2d');

    const D    = 1.0;    // distance to screen (m)
    const SIZE = 15;     // half-size of screen (mm)
    const N    = 300;    // grid resolution

    let currentMode = 'rect';
    let a_um = 50, b_um = 80, wav_nm = 550;

    function wavToRGB(w) {
        let r, g, b;
        if      (w < 440) { r = (440-w)/(440-380)*0.5; g = 0;                b = 1; }
        else if (w < 490) { r = 0;                      g = (w-440)/(490-440); b = 1; }
        else if (w < 510) { r = 0;                      g = 1;                b = (510-w)/(510-490); }
        else if (w < 580) { r = (w-510)/(580-510);      g = 1;                b = 0; }
        else if (w < 645) { r = 1;                      g = (645-w)/(645-580); b = 0; }
        else              { r = 1;                      g = 0;                b = 0; }
        return [r, g, b];
    }

    // sinc(x) = sin(x)/x (NOT numpy convention here — we pass beta directly)
    function sincBeta(beta) {
        if (Math.abs(beta) < 1e-10) return 1.0;
        return Math.sin(beta) / beta;
    }

    // Bessel J1 approximation (Horner's method, accurate to ~1e-7)
    function j1(x) {
        const ax = Math.abs(x);
        if (ax < 8.0) {
            const y = x * x;
            const ans1 = x * (72362614232.0 + y*(-7895059235.0 + y*(242396853.1 + y*(-2972611.439 + y*(15704.48260 + y*(-30.16036606))))));
            const ans2 = 144725228442.0 + y*(2300535178.0 + y*(18583304.74 + y*(99447.43394 + y*(376.9991397 + y*1.0))));
            return ans1 / ans2;
        } else {
            const z = 8.0 / ax;
            const y = z * z;
            const xx = ax - 2.356194491;
            const ans1 = 1.0 + y*(0.183105e-2 + y*(-0.3516396496e-4 + y*(0.2457520174e-5 + y*(-0.240337019e-6))));
            const ans2 = 0.04687499995 + y*(-0.2002690873e-3 + y*(0.8449199096e-5 + y*(-0.88228987e-6 + y*0.105787412e-6)));
            const ans = Math.sqrt(0.636619772 / ax) * (Math.cos(xx) * ans1 - z * Math.sin(xx) * ans2);
            return x < 0 ? -ans : ans;
        }
    }

    function airyIntensity(r_m) {
        const wav_m = wav_nm * 1e-9;
        const a_m   = a_um  * 1e-6; // radius
        const theta = r_m / D;
        const v = (2 * Math.PI * a_m * Math.sin(theta)) / wav_m;
        if (Math.abs(v) < 1e-10) return 1.0;
        const val = 2 * j1(v) / v;
        return val * val;
    }

    // Draw aperture schematic
    function drawSchematic() {
        const W = simC.width, H = simC.height;
        if (!W || !H) return;
        ctxS.clearRect(0, 0, W, H);

        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        const slitX = W * 0.35, cy = H / 2;

        // Incident rays
        ctxS.globalAlpha = 0.4; ctxS.strokeStyle = col; ctxS.lineWidth = 1.2;
        for (let y = 8; y < H; y += 14) {
            ctxS.beginPath(); ctxS.moveTo(8, y); ctxS.lineTo(slitX - 4, y); ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Aperture barrier
        ctxS.fillStyle = '#2a3a5a';
        const apertureH = Math.max(6, Math.min(50, a_um / 3));
        const apertureW = currentMode === 'rect' ? Math.max(4, Math.min(40, b_um / 3)) : apertureH;

        ctxS.fillRect(slitX - 3, 0, 6, cy - apertureH);
        ctxS.fillRect(slitX - 3, cy + apertureH, 6, H);

        if (currentMode === 'rect') {
            // Rectangular opening
            ctxS.strokeStyle = col; ctxS.lineWidth = 2;
            ctxS.strokeRect(slitX - apertureW/2 - 1, cy - apertureH, apertureW + 2, apertureH*2);
        } else {
            // Circular opening
            ctxS.beginPath(); ctxS.arc(slitX, cy, apertureH, 0, Math.PI*2);
            ctxS.strokeStyle = col; ctxS.lineWidth = 2; ctxS.stroke();
            // Fill the circular opening (remove barrier inside)
            ctxS.fillStyle = '#000';
            ctxS.beginPath(); ctxS.arc(slitX, cy, apertureH - 1, 0, Math.PI*2); ctxS.fill();
        }

        // Diffracted fan
        ctxS.globalAlpha = 0.18;
        for (let ang = -50; ang <= 50; ang += 6) {
            const rad = ang * Math.PI / 180;
            ctxS.strokeStyle = col; ctxS.lineWidth = 1;
            ctxS.beginPath();
            ctxS.moveTo(slitX, cy);
            ctxS.lineTo(slitX + Math.cos(rad)*(W*0.5), cy + Math.sin(rad)*(W*0.5));
            ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Lens
        const lensX = W * 0.72;
        ctxS.strokeStyle = '#555'; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.ellipse(lensX, cy, 5, H*0.38, 0, 0, Math.PI*2); ctxS.stroke();

        // Screen
        ctxS.fillStyle = '#1a2a4a';
        ctxS.fillRect(W*0.92, 4, 5, H - 8);

        // Labels
        ctxS.font = '9px Space Mono'; ctxS.textAlign = 'center';
        ctxS.fillStyle = col;
        const label = currentMode === 'rect' ? `a=${a_um}µm  b=${b_um}µm` : `r=${a_um}µm`;
        ctxS.fillText(label, slitX, 12);
        ctxS.fillStyle = '#8892b0';
        ctxS.fillText(`λ = ${wav_nm} nm`, slitX, 24);
        ctxS.textAlign = 'left';
    }

    // Draw 2D diffraction pattern
    function drawPattern() {
        const W = canPat.width, H = canPat.height;
        if (!W || !H) return;

        const [r,g,b] = wavToRGB(wav_nm);
        const wav_m = wav_nm * 1e-9;
        const a_m   = a_um  * 1e-6;
        const bb_m  = b_um  * 1e-6;

        const imgData = ctxPat.createImageData(W, H);

        for (let py = 0; py < H; py++) {
            const y_m = ((py / H) * 2 - 1) * SIZE * 1e-3;
            for (let px = 0; px < W; px++) {
                const x_m = ((px / W) * 2 - 1) * SIZE * 1e-3;

                let I;
                if (currentMode === 'rect') {
                    const alpha = (Math.PI * a_m * x_m) / (wav_m * D);
                    const beta  = (Math.PI * bb_m * y_m) / (wav_m * D);
                    I = sincBeta(alpha) ** 2 * sincBeta(beta) ** 2;
                } else {
                    const rr = Math.sqrt(x_m*x_m + y_m*y_m);
                    I = airyIntensity(rr);
                }

                // Gamma correction for visibility of secondary maxima (same as Python pow(I, 0.4))
                const Ig = Math.pow(Math.max(0, I), 0.4);

                const idx = (py * W + px) * 4;
                imgData.data[idx]   = Math.round(r * Ig * 255);
                imgData.data[idx+1] = Math.round(g * Ig * 255);
                imgData.data[idx+2] = Math.round(b * Ig * 255);
                imgData.data[idx+3] = 255;
            }
        }
        ctxPat.putImageData(imgData, 0, 0);

        // Title overlay
        ctxPat.fillStyle = 'rgba(0,0,0,0.6)';
        ctxPat.fillRect(0, 0, W, 22);
        ctxPat.fillStyle = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        ctxPat.font = '10px Space Mono'; ctxPat.textAlign = 'center';
        const title = currentMode === 'rect'
            ? `PATRÓN: RECTÁNGULO  a=${a_um}µm  b=${b_um}µm  λ=${wav_nm}nm`
            : `PATRÓN: DISCO DE AIRY  r=${a_um}µm  λ=${wav_nm}nm`;
        ctxPat.fillText(title, W/2, 14);

        // Scale bar
        ctxPat.fillStyle = '#8892b0'; ctxPat.textAlign = 'left';
        ctxPat.font = '9px Space Mono';
        ctxPat.fillText(`±${SIZE} mm`, 4, H - 4);
        ctxPat.textAlign = 'left';

        // Update info box
        const wav_m2 = wav_nm * 1e-9;
        const a_m2   = a_um  * 1e-6;
        if (currentMode === 'rect') {
            const th_a = (wav_m2 / a_m2) * 1000;
            const th_b = (wav_m2 / (b_um*1e-6)) * 1000;
            document.getElementById('infoDisplay').innerText =
                `I = sinc²(π·a·x/λD) · sinc²(π·b·y/λD)\nPrimer cero: θₓ = λ/a = ${th_a.toFixed(2)} mrad  |  θᵧ = λ/b = ${th_b.toFixed(2)} mrad`;
        } else {
            const th_airy = 1.22 * wav_m2 / a_m2 * 1000;
            document.getElementById('infoDisplay').innerText =
                `I = [2·J₁(v)/v]²  con  v = 2π·R·sin(θ)/λ\nPrimer cero Airy: θ = 1.22·λ/R = ${th_airy.toFixed(2)} mrad`;
        }
    }

    function update() {
        drawSchematic();
        drawPattern();
    }

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            // Show/hide B slider
            document.getElementById('groupB').style.display = currentMode === 'rect' ? '' : 'none';
            document.getElementById('labelA').firstChild.textContent =
                currentMode === 'rect' ? 'Dim A — ancho ' : 'Radio apertura ';
            update();
        });
    });

    document.getElementById('aSlider').oninput = e => {
        a_um = parseInt(e.target.value);
        document.getElementById('aVal').innerText = a_um;
        update();
    };
    document.getElementById('bSlider').oninput = e => {
        b_um = parseInt(e.target.value);
        document.getElementById('bVal').innerText = b_um;
        update();
    };
    document.getElementById('wavSlider').oninput = e => {
        wav_nm = parseInt(e.target.value);
        document.getElementById('wavVal').innerText = wav_nm;
        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        e.target.style.accentColor = col;
        document.getElementById('wavLabel').style.color = col;
        update();
    };

    function resize() {
        simC.width    = simC.offsetWidth;
        canPat.width  = canPat.offsetWidth;
        canPat.height = canPat.offsetHeight || 420;
        update();
    }
    window.onresize = resize;
    requestAnimationFrame(resize);
</script>
</body>
</html>
