<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Difracción Rendija Única | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.78rem; line-height: 1.8; white-space: pre-line; }
        .plots-column { display: flex; flex-direction: column; gap: 15px; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Difracción de Fraunhofer — Rendija Única</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="180"></canvas>
        <div class="controls">
            <div id="infoDisplay" class="freq-box">β = π·b·sin(θ)/λ  |  I = sinc²(β/π)</div>

            <div class="control-group">
                <label>Ancho de rendija b <span><span id="bVal">50</span> µm</span></label>
                <input type="range" id="bSlider" min="10" max="200" step="1" value="50">
            </div>
            <div class="control-group">
                <label id="wavLabel" style="color:#00ff99;">Longitud de onda λ <span><span id="wavVal">550</span> nm</span></label>
                <input type="range" id="wavSlider" min="380" max="750" step="1" value="550">
            </div>
        </div>
    </div>

    <div class="plots-column">
        <canvas id="canvasIntensity" height="300"></canvas>
        <canvas id="canvasPattern"   height="80"></canvas>
    </div>
</div>

<script>
    const simC   = document.getElementById('simCanvas'),       ctxS   = simC.getContext('2d');
    const canI   = document.getElementById('canvasIntensity'), ctxI   = canI.getContext('2d');
    const canPat = document.getElementById('canvasPattern'),   ctxPat = canPat.getContext('2d');

    const F = 0.5;  // focal fija = 500 mm (igual al Python original)

    let b_um = 50, wav_nm = 550;

    function wavToRGB(w) {
        let r, g, b;
        if      (w < 440) { r = (440-w)/(440-380)*0.5; g = 0;               b = 1; }
        else if (w < 490) { r = 0;                      g = (w-440)/(490-440); b = 1; }
        else if (w < 510) { r = 0;                      g = 1;               b = (510-w)/(510-490); }
        else if (w < 580) { r = (w-510)/(580-510);      g = 1;               b = 0; }
        else if (w < 645) { r = 1;                      g = (645-w)/(645-580); b = 0; }
        else              { r = 1;                      g = 0;               b = 0; }
        return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
    }

    function sinc2(x) {
        // numpy sinc(x) = sin(pi*x)/(pi*x), so sinc(beta/pi) = sin(beta)/beta
        if (Math.abs(x) < 1e-10) return 1.0;
        return (Math.sin(x) / x) ** 2;
    }

    function getIntensity(y_m) {
        const b_m   = b_um  * 1e-6;
        const wav_m = wav_nm * 1e-9;
        const theta = y_m / F;
        const beta  = (Math.PI * b_m * Math.sin(theta)) / wav_m;
        return sinc2(beta);
    }

    // Draw slit schematic
    function drawSchematic() {
        const W = simC.width, H = simC.height;
        if (!W || !H) return;
        ctxS.clearRect(0, 0, W, H);

        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${r},${g},${b})`;
        const slitX = W * 0.30;
        const bPx   = Math.max(3, b_um / 8);
        const cy    = H / 2;

        // Incident rays
        ctxS.globalAlpha = 0.45;
        ctxS.strokeStyle = col; ctxS.lineWidth = 1.2;
        for (let y = 8; y < H; y += 16) {
            ctxS.beginPath(); ctxS.moveTo(8, y); ctxS.lineTo(slitX - 3, y); ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Barrier
        ctxS.fillStyle = '#2a3a5a';
        ctxS.fillRect(slitX - 3, 0,         6, cy - bPx);
        ctxS.fillRect(slitX - 3, cy + bPx,  6, H - cy - bPx);

        // Slit gap highlight
        ctxS.strokeStyle = col; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.moveTo(slitX, cy - bPx); ctxS.lineTo(slitX, cy + bPx); ctxS.stroke();

        // Diffracted fan
        ctxS.globalAlpha = 0.2;
        for (let angle = -55; angle <= 55; angle += 7) {
            const rad = angle * Math.PI / 180;
            ctxS.strokeStyle = col; ctxS.lineWidth = 1;
            ctxS.beginPath();
            ctxS.moveTo(slitX, cy);
            ctxS.lineTo(slitX + Math.cos(rad)*(W*0.55), cy + Math.sin(rad)*(W*0.55));
            ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Lens
        const lensX = W * 0.68;
        ctxS.strokeStyle = '#666'; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.ellipse(lensX, cy, 5, H*0.36, 0, 0, Math.PI*2); ctxS.stroke();

        // Screen
        ctxS.fillStyle = '#1a2a4a';
        ctxS.fillRect(W*0.90 - 3, 4, 5, H - 8);

        // Labels
        ctxS.font = '9px Space Mono'; ctxS.textAlign = 'center';
        ctxS.fillStyle = '#8892b0';
        ctxS.fillText(`b = ${b_um} µm`, slitX, 12);
        ctxS.fillStyle = col;
        ctxS.fillText(`λ = ${wav_nm} nm`, slitX, 24);
        ctxS.fillStyle = '#8892b0';
        ctxS.fillText('f = 500 mm', (lensX + W*0.90)/2, H - 4);
        ctxS.textAlign = 'left';
    }

    // Draw intensity profile (sinc²)
    function drawIntensity() {
        const W = canI.width, H = canI.height;
        if (!W || !H) return;
        ctxI.clearRect(0, 0, W, H);

        const margin = { left: 50, right: 20, top: 28, bottom: 38 };
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;

        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${r},${g},${b})`;
        const xRange = 20; // ±20 mm

        // Grid lines
        ctxI.strokeStyle = '#16203a'; ctxI.lineWidth = 1;
        ctxI.font = '10px Space Mono'; ctxI.fillStyle = '#8892b0';

        for (let i = 0; i <= 4; i++) {
            const gy = margin.top + (1 - i/4) * h;
            ctxI.beginPath(); ctxI.moveTo(margin.left, gy); ctxI.lineTo(margin.left + w, gy); ctxI.stroke();
            ctxI.fillText((i/4).toFixed(2), 4, gy + 4);
        }
        for (let i = -4; i <= 4; i++) {
            const gx = margin.left + (i/4 + 1)/2 * w;
            ctxI.beginPath(); ctxI.moveTo(gx, margin.top); ctxI.lineTo(gx, margin.top + h); ctxI.stroke();
            if (i % 2 === 0) ctxI.fillText(`${i*5}`, gx - 8, margin.top + h + 14);
        }

        // Axis labels
        ctxI.fillStyle = '#8892b0';
        ctxI.fillText('Posición en pantalla (mm)', margin.left + w/2 - 70, margin.top + h + 32);
        ctxI.fillText('I / I₀', 4, margin.top - 10);

        // Title
        ctxI.fillStyle = col; ctxI.font = '10px Space Mono';
        ctxI.fillText(`PERFIL DE INTENSIDAD  b = ${b_um} µm  λ = ${wav_nm} nm`, margin.left, margin.top - 10);

        // Compute intensity points
        const N = 800;
        const pts = [];
        for (let i = 0; i <= N; i++) {
            const y_mm = -xRange + (2*xRange * i / N);
            const I    = getIntensity(y_mm * 1e-3);
            pts.push([
                margin.left + (y_mm + xRange) / (2*xRange) * w,
                margin.top  + (1 - I) * h
            ]);
        }

        // Fill
        ctxI.beginPath();
        ctxI.moveTo(pts[0][0], margin.top + h);
        pts.forEach(([px, py]) => ctxI.lineTo(px, py));
        ctxI.lineTo(pts[pts.length-1][0], margin.top + h);
        ctxI.closePath();
        ctxI.fillStyle = `rgba(${r},${g},${b},0.18)`;
        ctxI.fill();

        // Line
        ctxI.beginPath(); ctxI.strokeStyle = col; ctxI.lineWidth = 2;
        pts.forEach(([px,py], i) => i===0 ? ctxI.moveTo(px,py) : ctxI.lineTo(px,py));
        ctxI.stroke();

        // First minima markers
        const b_m   = b_um  * 1e-6;
        const wav_m = wav_nm * 1e-9;
        const y_min_mm = (F * wav_m / b_m) * 1e3;

        if (y_min_mm < xRange) {
            [y_min_mm, -y_min_mm].forEach(ym => {
                const gx = margin.left + (ym + xRange) / (2*xRange) * w;
                ctxI.save();
                ctxI.setLineDash([4,4]);
                ctxI.strokeStyle = 'rgba(255,255,255,0.35)'; ctxI.lineWidth = 1;
                ctxI.beginPath(); ctxI.moveTo(gx, margin.top); ctxI.lineTo(gx, margin.top + h); ctxI.stroke();
                ctxI.restore();
                ctxI.fillStyle = '#fff'; ctxI.font = '9px Space Mono';
                ctxI.fillText(`${ym > 0 ? '+' : ''}${ym.toFixed(1)}`, gx + 2, margin.top + 13);
            });
        }

        // Update info box
        const theta_min_mrad = (wav_m / b_m) * 1000;
        document.getElementById('infoDisplay').innerText =
            `β = π·b·sin(θ)/λ  |  I = sinc²(β/π)\nPrimer mínimo: θ = λ/b = ${theta_min_mrad.toFixed(3)} mrad  |  y = ±${y_min_mm.toFixed(2)} mm`;
    }

    // Draw screen pattern
    function drawPattern() {
        const W = canPat.width, H = canPat.height;
        if (!W || !H) return;
        ctxPat.clearRect(0, 0, W, H);

        const [r,g,b] = wavToRGB(wav_nm);
        const xRange  = 20e-3; // ±20 mm in metres
        const imgData = ctxPat.createImageData(W, H);

        for (let px = 0; px < W; px++) {
            const y_m = -xRange + (2*xRange * px / W);
            const I   = getIntensity(y_m);
            const rv  = Math.round(r * I);
            const gv  = Math.round(g * I);
            const bv  = Math.round(b * I);
            for (let py = 0; py < H; py++) {
                const idx = (py * W + px) * 4;
                imgData.data[idx]   = rv;
                imgData.data[idx+1] = gv;
                imgData.data[idx+2] = bv;
                imgData.data[idx+3] = 255;
            }
        }
        ctxPat.putImageData(imgData, 0, 0);

        // Label overlay
        ctxPat.fillStyle = 'rgba(0,0,0,0.55)';
        ctxPat.fillRect(0, 0, 190, 16);
        ctxPat.fillStyle = '#8892b0'; ctxPat.font = '9px Space Mono';
        ctxPat.fillText('Patrón en pantalla (±20 mm)', 4, 11);
    }

    function update() {
        drawSchematic();
        drawIntensity();
        drawPattern();
    }

    // Sliders
    document.getElementById('bSlider').oninput = e => {
        b_um = parseInt(e.target.value);
        document.getElementById('bVal').innerText = b_um;
        update();
    };
    document.getElementById('wavSlider').oninput = e => {
        wav_nm = parseInt(e.target.value);
        document.getElementById('wavVal').innerText = wav_nm;
        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${r},${g},${b})`;
        e.target.style.accentColor = col;
        document.getElementById('wavLabel').style.color = col;
        update();
    };

    function resize() {
        simC.width   = simC.offsetWidth;
        canI.width   = canI.offsetWidth;
        canI.height  = 300;
        canPat.width  = canPat.offsetWidth;
        canPat.height = 80;
        update();
    }
    window.onresize = resize;
    // Wait for layout before first draw
    requestAnimationFrame(resize);
</script>
</body>
</html>
