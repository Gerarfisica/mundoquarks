<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oscilador Longitudinal | Mundo Quarks</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --cyan: #00d4ff; --white: #eef2ff; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; }
        .panel { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
        canvas { background: #000; border-radius: 8px; width: 100%; height: 220px; border: 1px solid #1a2a4a; }
        .freq-box { background: #151515; border: 1px solid var(--cyan); padding: 10px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin: 15px 0; border-radius: 5px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.7rem; color: var(--cyan); }
        input[type="range"] { width: 100%; accent-color: var(--cyan); }
        .plot-div { height: 180px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; }
        .btn-restart { width: 100%; padding: 10px; background: #1a6cf5; color: white; border: none; font-family: 'Space Mono'; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Oscilador Longitudinal RK4</h1>
    <div class="panel">
        <canvas id="simCanvas"></canvas>
        <div id="freqDisplay" class="freq-box">ω₀ = --- rad/s</div>
        <div class="control-group">
            <label>Masa: <span id="mVal">1.0</span> kg</label>
            <input type="range" id="mSlider" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>k1: <span id="k1Val">5.0</span> N/m</label>
            <input type="range" id="k1Slider" min="0.5" max="30.0" step="0.5" value="5.0">
        </div>
        <div class="control-group">
            <label>k2: <span id="k2Val">5.0</span> N/m</label>
            <input type="range" id="k2Slider" min="0.5" max="30.0" step="0.5" value="5.0">
        </div>
        <button class="btn-restart" onclick="initPlots(); restartPhys();">REINICIAR</button>
    </div>

    <div class="plots">
        <div id="plotP" class="plot-div"></div>
        <div id="plotV" class="plot-div"></div>
        <div id="plotA" class="plot-div"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    let m = 1.0, k1 = 5.0, k2 = 5.0, x = 0.8, v = 0.0, t = 0;
    const dt = 0.016, T_MAX = 10.0;

    function accel(p) { return (-(k1 + k2) * p) / m; }

    function initPlots() {
        const layout = (title, color) => ({
            title: { text: title, font: { size: 11, color: '#fff' } },
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            margin: { t: 30, b: 20, l: 40, r: 10 },
            xaxis: { range: [0, T_MAX], fixedrange: true, gridcolor: '#111' },
            yaxis: { autorange: true, gridcolor: '#111', tickfont: {color: color} }
        });
        Plotly.newPlot('plotP', [{ x: [0], y: [0], line: {color: '#00FF7F'} }], layout('Posición x(t)', '#00FF7F'), {staticPlot: true});
        Plotly.newPlot('plotV', [{ x: [0], y: [0], line: {color: '#FFD700'} }], layout('Velocidad v(t)', '#FFD700'), {staticPlot: true});
        Plotly.newPlot('plotA', [{ x: [0], y: [0], line: {color: '#FF4500'} }], layout('Aceleración a(t)', '#FF4500'), {staticPlot: true});
    }

    function update() {
        // RK4
        let k1v = accel(x), k1x = v;
        let k2v = accel(x + 0.5*dt*k1x), k2x = v + 0.5*dt*k1v;
        let k3v = accel(x + 0.5*dt*k2x), k3x = v + 0.5*dt*k2v;
        let k4v = accel(x + dt*k3x), k4x = v + dt*k3v;
        v += (dt/6)*(k1v + 2*k2v + 2*k3v + k4v);
        x += (dt/6)*(k1x + 2*k2x + 2*k3x + k4x);
        t += dt;

        if (t > T_MAX) { t = 0; initPlots(); }

        // Empujar datos a los gráficos de forma simultánea
        Plotly.extendTraces('plotP', { x: [[t]], y: [[x]] }, [0]);
        Plotly.extendTraces('plotV', { x: [[t]], y: [[v]] }, [0]);
        Plotly.extendTraces('plotA', { x: [[t]], y: [[accel(x)]] }, [0]);

        // Dibujar Masa
        ctx.clearRect(0,0,500,220);
        const px = 250 + x * 100;
        ctx.strokeStyle = '#4e5b7e'; ctx.beginPath();
        ctx.moveTo(100, 110); ctx.lineTo(px, 110); ctx.moveTo(400, 110); ctx.lineTo(px, 110); ctx.stroke();
        ctx.fillStyle = '#00d4ff'; ctx.beginPath(); ctx.arc(px, 110, 15, 0, 7); ctx.fill();
        
        requestAnimationFrame(update);
    }

    function restartPhys() { 
        t = 0; x = 0.8; v = 0; 
        document.getElementById('freqDisplay').innerText = `ω₀ = ${Math.sqrt((k1+k2)/m).toFixed(3)} rad/s`;
    }

    document.getElementById('mSlider').oninput = e => { m = parseFloat(e.target.value); document.getElementById('mVal').innerText = m; initPlots(); restartPhys(); };
    document.getElementById('k1Slider').oninput = e => { k1 = parseFloat(e.target.value); document.getElementById('k1Val').innerText = k1; initPlots(); restartPhys(); };
    document.getElementById('k2Slider').oninput = e => { k2 = parseFloat(e.target.value); document.getElementById('k2Val').innerText = k2; initPlots(); restartPhys(); };

    canvas.width = 500; canvas.height = 220;
    initPlots(); restartPhys(); update();
</script>
</body>
</html>
