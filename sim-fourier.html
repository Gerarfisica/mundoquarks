<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fourier en Cuerdas | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 18px; border-radius: 15px; height: fit-content; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .freq-box { background: rgba(0,212,255,0.05); border: 1px solid var(--cyan); padding: 10px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 14px; border-radius: 8px; font-size: 0.7rem; line-height: 1.9; white-space: pre-line; }
        .controls { margin-top: 14px; }
        .control-group { margin-bottom: 14px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #ff00ff; cursor: pointer; }

        .mode-label { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--cyan); margin-bottom: 6px; display: block; }
        .mode-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 14px; }
        .mode-btn {
            background: rgba(255,0,255,0.05); border: 1px solid var(--border);
            color: var(--gray); font-family: 'Space Mono'; font-size: 0.58rem;
            padding: 6px 2px; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .mode-btn:hover { border-color: #ff00ff; color: var(--white); }
        .mode-btn.active { background: rgba(255,0,255,0.18); color: #ff88ff; border-color: #ff00ff; font-weight: bold; }

        .right-col { display: flex; flex-direction: column; gap: 12px; }
        canvas { background: #000; border-radius: 10px; border: 1px solid #1a2a4a; display: block; width: 100%; }
        #canStr  { height: 220px; }
        #canSpec { height: 220px; }

        .ref-block { font-family: 'Space Mono'; font-size: 0.6rem; color: var(--gray); line-height: 2.0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Fourier — Cuerda Fijo-Libre: Coeficientes Aₙ(t)</h1>

    <div class="panel-left">
        <div id="infoDisplay" class="freq-box">ω₁t = 0.00π\nArmónicos: 1..41 (impares)</div>

        <div class="controls">
            <span class="mode-label">Armónicos máximos (n_max)</span>
            <div class="mode-options">
                <button class="mode-btn" data-nmax="5">5</button>
                <button class="mode-btn" data-nmax="11">11</button>
                <button class="mode-btn" data-nmax="21">21</button>
                <button class="mode-btn active" data-nmax="41">41</button>
            </div>

            <div class="control-group">
                <label>Amplitud ψ₀ <span><span id="psi0Val">1.0</span></span></label>
                <input type="range" id="psi0Slider" min="0.2" max="2.0" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label>Velocidad v <span><span id="vVal">1.0</span></span></label>
                <input type="range" id="vSlider" min="0.2" max="3.0" step="0.1" value="1.0" style="accent-color:#ffdd00;">
            </div>
        </div>

        <div class="ref-block">
            <span>Cuerda Fijo-Libre</span>
            <span style="padding-left:6px;">ωₙ = n·ω₁  (n impar)</span>
            <span style="padding-left:6px;">ω₁ = πv/(2L)</span>
            <span style="padding-left:6px;">kₙ = nπ/(2L)</span>
            <span style="margin-top:6px;">Solución:</span>
            <span style="padding-left:6px;">y(x,t) = Σ Aₙ·sin(kₙx)·cos(ωₙt)</span>
            <span style="margin-top:6px;color:#ff88ff;">Aₙ = (2ψ₀/L)·(2L/nπ)·(Δcos)</span>
        </div>
    </div>

    <div class="right-col">
        <canvas id="canStr"  height="220"></canvas>
        <canvas id="canSpec" height="220"></canvas>
    </div>
</div>

<script>
    const canStr  = document.getElementById('canStr'),  ctxStr  = canStr.getContext('2d');
    const canSpec = document.getElementById('canSpec'), ctxSpec = canSpec.getContext('2d');

    const L  = 1.0;
    const NX = 500;
    const xArr = Array.from({length: NX}, (_, i) => i / (NX - 1) * L);

    let psi0   = 1.0;
    let v      = 1.0;
    let n_max  = 41;
    let t      = 0;

    // ── PHYSICS ───────────────────────────────────────────────────────────────
    function calcAn(n) {
        // From the Python: An = (2*psi0/L)*(2L/(n*pi))*(cos(nπ/8) - cos(nπ/2))
        // Note: term_L = -cos(n*π/2), term_L4 = -cos(n*π/8) → An ∝ term_L4 - term_L = cos(nπ/2) - cos(nπ/8)
        const termL  = -Math.cos(n * Math.PI / 2);
        const termL4 = -Math.cos(n * Math.PI / 8);
        return (2 * psi0 / L) * (2 * L / (n * Math.PI)) * (termL4 - termL);
    }

    function buildImpares() {
        return Array.from({length: Math.ceil(n_max / 2)}, (_, i) => 2 * i + 1).filter(n => n < n_max + 1);
    }

    let impares = buildImpares();
    let AnMax   = impares.map(calcAn);

    function rebuild() {
        impares = buildImpares();
        AnMax   = impares.map(calcAn);
    }

    // ── STRING PANEL ──────────────────────────────────────────────────────────
    function drawString(currentCoeffs, phase) {
        const W = canStr.width, H = canStr.height;
        if (!W || !H) return;
        ctxStr.clearRect(0, 0, W, H);

        const margin = {left: 36, right: 36, top: 28, bottom: 18};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const midY = margin.top + h / 2;
        const scaleY = h / 2 * 0.85;

        // Boundaries
        // x=0: fixed (red dot)
        ctxStr.fillStyle='#ff4444'; ctxStr.shadowBlur=8; ctxStr.shadowColor='#ff4444';
        ctxStr.beginPath(); ctxStr.arc(margin.left, midY, 6, 0, Math.PI*2); ctxStr.fill();
        ctxStr.shadowBlur=0;
        // x=L: free (dashed line)
        ctxStr.strokeStyle='rgba(255,255,255,0.3)'; ctxStr.lineWidth=1.5; ctxStr.setLineDash([4,4]);
        ctxStr.beginPath(); ctxStr.moveTo(margin.left+w, margin.top+4); ctxStr.lineTo(margin.left+w, margin.top+h-4); ctxStr.stroke();
        ctxStr.setLineDash([]);

        // Zero axis
        ctxStr.strokeStyle='rgba(255,255,255,0.08)'; ctxStr.lineWidth=1;
        ctxStr.beginPath(); ctxStr.moveTo(margin.left, midY); ctxStr.lineTo(margin.left+w, midY); ctxStr.stroke();

        // Compute y total
        const yTotal = new Float64Array(NX);
        impares.forEach((n, i) => {
            const kn = n * Math.PI / (2 * L);
            const coeff = currentCoeffs[i];
            xArr.forEach((x, j) => {
                yTotal[j] += coeff * Math.sin(kn * x);
            });
        });

        // Draw string
        ctxStr.beginPath(); ctxStr.strokeStyle='#ff00ff'; ctxStr.lineWidth=2.5;
        ctxStr.shadowBlur=8; ctxStr.shadowColor='#ff00ff';
        yTotal.forEach((y, i) => {
            const px = margin.left + (i/(NX-1))*w;
            const py = midY - y*scaleY;
            i===0?ctxStr.moveTo(px,py):ctxStr.lineTo(px,py);
        });
        ctxStr.stroke(); ctxStr.shadowBlur=0;

        // x=L free end dot (follows string)
        const yL = yTotal[NX-1];
        ctxStr.strokeStyle='#ffdd00'; ctxStr.lineWidth=2;
        ctxStr.beginPath(); ctxStr.arc(margin.left+w, midY-yL*scaleY, 6, 0, Math.PI*2); ctxStr.stroke();
        ctxStr.fillStyle='rgba(255,221,0,0.2)'; ctxStr.fill();

        // Phase text
        ctxStr.fillStyle='#ffdd00'; ctxStr.font='bold 10px Space Mono'; ctxStr.textAlign='right';
        ctxStr.fillText(`ω₁t = ${(phase/Math.PI).toFixed(2)}π`, margin.left+w-4, margin.top+14);
        ctxStr.textAlign='left';

        // Title
        ctxStr.fillStyle='rgba(0,0,0,0.5)'; ctxStr.fillRect(0,0,W,20);
        ctxStr.fillStyle='#00d4ff'; ctxStr.font='10px Space Mono'; ctxStr.textAlign='center';
        ctxStr.fillText('EVOLUCIÓN TEMPORAL — Cuerda Fijo-Libre (solo armónicos impares)',W/2,13);
        ctxStr.textAlign='left';
    }

    // ── SPECTRUM PANEL ────────────────────────────────────────────────────────
    function drawSpectrum(currentCoeffs) {
        const W = canSpec.width, H = canSpec.height;
        if (!W || !H) return;
        ctxSpec.clearRect(0, 0, W, H);

        const margin = {left: 44, right: 20, top: 28, bottom: 36};
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;
        const midY = margin.top + h / 2;

        // Max An for scaling
        const maxA = Math.max(...AnMax.map(Math.abs), 0.01);

        // Grid
        ctxSpec.strokeStyle='#16203a'; ctxSpec.lineWidth=1;
        ctxSpec.font='9px Space Mono'; ctxSpec.fillStyle='#8892b0';
        [-1, -0.5, 0, 0.5, 1].forEach(frac => {
            const gy = midY - frac * (h/2) * 0.9;
            ctxSpec.beginPath(); ctxSpec.moveTo(margin.left, gy); ctxSpec.lineTo(margin.left+w, gy); ctxSpec.stroke();
            ctxSpec.fillText((frac*maxA).toFixed(2), 4, gy+4);
        });

        // Zero axis
        ctxSpec.strokeStyle='rgba(255,255,255,0.2)'; ctxSpec.lineWidth=1;
        ctxSpec.beginPath(); ctxSpec.moveTo(margin.left, midY); ctxSpec.lineTo(margin.left+w, midY); ctxSpec.stroke();

        // Bars: Aₙ(t) = Aₙ_max * cos(ωₙt)
        const nAll = n_max; // x axis goes 1..n_max
        const barW = Math.max(2, w / nAll * 0.6);

        impares.forEach((n, i) => {
            const An_t = currentCoeffs[i];
            const barH = (An_t / maxA) * (h/2) * 0.9;
            const bx = margin.left + ((n - 0.5) / nAll) * w - barW/2;
            const by = An_t >= 0 ? midY - barH : midY;
            const bh = Math.abs(barH);

            // Color: positive cyan, negative magenta
            const alpha = 0.5 + 0.5 * Math.abs(An_t) / maxA;
            ctxSpec.fillStyle = An_t >= 0
                ? `rgba(0,212,255,${alpha})`
                : `rgba(255,0,255,${alpha})`;
            ctxSpec.fillRect(bx, by, barW, bh);
            ctxSpec.strokeStyle = An_t >= 0 ? '#00d4ff' : '#ff00ff';
            ctxSpec.lineWidth = 1;
            ctxSpec.strokeRect(bx, by, barW, bh);

            // n label for first few
            if (n <= 11) {
                ctxSpec.fillStyle='#8892b0'; ctxSpec.font='8px Space Mono'; ctxSpec.textAlign='center';
                ctxSpec.fillText(`${n}`, bx+barW/2, margin.top+h+14);
            }
        });

        // X axis labels
        ctxSpec.fillStyle='#8892b0'; ctxSpec.font='9px Space Mono'; ctxSpec.textAlign='center';
        ctxSpec.fillText('n (armónico impar)', margin.left+w/2, margin.top+h+28);
        ctxSpec.fillText('Aₙ(t) = Aₙ·cos(ωₙt)', margin.left+w/2, 13);

        // Title
        ctxSpec.fillStyle='rgba(0,0,0,0.5)'; ctxSpec.fillRect(0,0,W,20);
        ctxSpec.fillStyle='#ffdd00'; ctxSpec.font='10px Space Mono';
        ctxSpec.fillText('ESPECTRO DE COEFICIENTES  Aₙ(t)',W/2,13);
        ctxSpec.textAlign='left';
    }

    function loop() {
        const w1  = Math.PI * v / (2 * L);
        const phase = w1 * t;

        // Compute current coefficients: An(t) = AnMax[i] * cos(ωn * t)
        const currentCoeffs = impares.map((n, i) => {
            const wn = n * w1;
            return AnMax[i] * Math.cos(wn * t);
        });

        drawString(currentCoeffs, phase);
        drawSpectrum(currentCoeffs);

        // Update info
        document.getElementById('infoDisplay').innerText =
            `ω₁t = ${(phase/Math.PI).toFixed(3)}π\nω₁ = ${w1.toFixed(4)} rad/s\nArmónicos impares: 1..${n_max}\nn_terms = ${impares.length}`;

        t += 0.025;
        if (t > 4 * Math.PI / w1) t = 0; // loop over 2 full periods

        requestAnimationFrame(loop);
    }

    // Controls
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            n_max = parseInt(btn.dataset.nmax);
            rebuild(); t = 0;
        });
    });
    document.getElementById('psi0Slider').oninput = e => {
        psi0 = parseFloat(e.target.value);
        document.getElementById('psi0Val').innerText = psi0.toFixed(1);
        rebuild();
    };
    document.getElementById('vSlider').oninput = e => {
        v = parseFloat(e.target.value);
        document.getElementById('vVal').innerText = v.toFixed(1);
    };

    function resize() {
        canStr.width  = canStr.offsetWidth;  canStr.height  = 220;
        canSpec.width = canSpec.offsetWidth; canSpec.height = 220;
    }
    window.onresize = resize;
    requestAnimationFrame(() => { resize(); loop(); });
</script>
</body>
</html>
