<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Difracción Doble Rendija | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.75rem; line-height: 1.8; white-space: pre-line; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .plots-column { display: flex; flex-direction: column; gap: 12px; }
        #canvasPlot   { height: 300px; }
        #canvasPattern { height: 70px; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Interferencia de Young — Doble Rendija con Difracción</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="170"></canvas>
        <div class="controls">
            <div id="infoDisplay" class="freq-box">I = sinc²(β) · cos²(γ)\nβ = π·b·sin(θ)/λ  |  γ = π·d·sin(θ)/λ</div>

            <div class="control-group">
                <label id="wavLabel" style="color:#00ff99;">Longitud de onda λ <span><span id="wavVal">550</span> nm</span></label>
                <input type="range" id="wavSlider" min="380" max="750" step="1" value="550">
            </div>
            <div class="control-group">
                <label>Ancho rendija b <span><span id="bVal">10</span> µm</span></label>
                <input type="range" id="bSlider" min="2" max="50" step="1" value="10">
            </div>
            <div class="control-group">
                <label style="color:#ff88ff;">Separación d <span><span id="dVal">60</span> µm</span></label>
                <input type="range" id="dSlider" min="40" max="300" step="1" value="60" style="accent-color:#ff88ff;">
            </div>
        </div>
    </div>

    <div class="plots-column">
        <canvas id="canvasPlot"    height="300"></canvas>
        <canvas id="canvasPattern" height="70"></canvas>
    </div>
</div>

<script>
    const simC   = document.getElementById('simCanvas'),     ctxS   = simC.getContext('2d');
    const canPl  = document.getElementById('canvasPlot'),    ctxPl  = canPl.getContext('2d');
    const canPat = document.getElementById('canvasPattern'), ctxPat = canPat.getContext('2d');

    const F    = 0.5;    // focal (m)
    const XLIM = 15;     // ±15 mm on screen
    const NPTS = 1200;

    let wav_nm = 550, b_um = 10, d_um = 60;

    function wavToRGB(w) {
        let r, g, b;
        if      (w < 440) { r = (440-w)/(440-380)*0.5; g = 0;                b = 1; }
        else if (w < 490) { r = 0;                      g = (w-440)/(490-440); b = 1; }
        else if (w < 510) { r = 0;                      g = 1;                b = (510-w)/(510-490); }
        else if (w < 580) { r = (w-510)/(580-510);      g = 1;                b = 0; }
        else if (w < 645) { r = 1;                      g = (645-w)/(645-580); b = 0; }
        else              { r = 1;                      g = 0;                b = 0; }
        return [r, g, b];
    }

    function sinc(x) {
        if (Math.abs(x) < 1e-12) return 1.0;
        return Math.sin(x) / x;
    }

    // Returns arrays {theta, y_mm, I, diffraction}
    function compute() {
        const wav = wav_nm * 1e-9;
        const b   = b_um   * 1e-6;
        const d   = d_um   * 1e-6;
        const theta = [], y_mm = [], I = [], diff = [];

        for (let i = 0; i < NPTS; i++) {
            const th = -0.02 + 0.04 * i / (NPTS - 1);
            const y  = F * Math.tan(th) * 1000;
            if (y < -XLIM || y > XLIM) { theta.push(th); y_mm.push(y); I.push(0); diff.push(0); continue; }
            const beta  = (Math.PI * b * Math.sin(th)) / wav;
            const gamma = (Math.PI * d * Math.sin(th)) / wav;
            const D2 = sinc(beta) ** 2;
            const cost = Math.cos(gamma);
            theta.push(th); y_mm.push(y); diff.push(D2); I.push(D2 * cost * cost);
        }
        return { theta, y_mm, I, diff };
    }

    // Draw slit schematic
    function drawSchematic() {
        const W = simC.width, H = simC.height;
        if (!W || !H) return;
        ctxS.clearRect(0, 0, W, H);

        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        const slitX = W * 0.32, cy = H / 2;
        const bPx = Math.max(2, b_um / 4);
        const dPx = Math.max(8, d_um / 5);

        // Incident rays
        ctxS.globalAlpha = 0.4; ctxS.strokeStyle = col; ctxS.lineWidth = 1.2;
        for (let y = 6; y < H; y += 14) {
            ctxS.beginPath(); ctxS.moveTo(6, y); ctxS.lineTo(slitX - 3, y); ctxS.stroke();
        }
        ctxS.globalAlpha = 1;

        // Barrier with two slits
        ctxS.fillStyle = '#2a3a5a';
        const top1 = cy - dPx/2 - bPx, bot1 = cy - dPx/2;
        const top2 = cy + dPx/2,        bot2 = cy + dPx/2 + bPx;
        ctxS.fillRect(slitX - 3, 0,    6, top1);
        ctxS.fillRect(slitX - 3, bot1, 6, top2 - bot1);
        ctxS.fillRect(slitX - 3, bot2, 6, H - bot2);

        // Slit openings
        ctxS.strokeStyle = col; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.moveTo(slitX, top1); ctxS.lineTo(slitX, bot1); ctxS.stroke();
        ctxS.beginPath(); ctxS.moveTo(slitX, top2); ctxS.lineTo(slitX, bot2); ctxS.stroke();

        // Diffraction fan from each slit
        ctxS.globalAlpha = 0.15;
        [[cy - dPx/2 - bPx/2], [cy + dPx/2 + bPx/2]].forEach(([sy]) => {
            for (let ang = -50; ang <= 50; ang += 8) {
                const rad = ang * Math.PI / 180;
                ctxS.strokeStyle = col; ctxS.lineWidth = 1;
                ctxS.beginPath(); ctxS.moveTo(slitX, sy);
                ctxS.lineTo(slitX + Math.cos(rad)*W*0.55, sy + Math.sin(rad)*W*0.55);
                ctxS.stroke();
            }
        });
        ctxS.globalAlpha = 1;

        // Lens
        const lensX = W * 0.70;
        ctxS.strokeStyle = '#555'; ctxS.lineWidth = 2;
        ctxS.beginPath(); ctxS.ellipse(lensX, cy, 5, H*0.38, 0, 0, Math.PI*2); ctxS.stroke();

        // Screen
        ctxS.fillStyle = '#1a2a4a'; ctxS.fillRect(W*0.91, 4, 5, H - 8);

        // Labels
        ctxS.font = '9px Space Mono'; ctxS.textAlign = 'center';
        ctxS.fillStyle = col; ctxS.fillText(`λ=${wav_nm}nm`, slitX, 12);
        ctxS.fillStyle = '#8892b0';
        ctxS.fillText(`b=${b_um}µm`, slitX, 24);
        ctxS.fillStyle = '#ff88ff';
        ctxS.fillText(`d=${d_um}µm`, slitX, 36);
        ctxS.textAlign = 'left';
    }

    function drawPlot(data) {
        const W = canPl.width, H = canPl.height;
        if (!W || !H) return;
        ctxPl.clearRect(0, 0, W, H);

        const margin = { left: 50, right: 20, top: 28, bottom: 38 };
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;

        const [r,g,b] = wavToRGB(wav_nm);
        const col    = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        const wav_m  = wav_nm * 1e-9;
        const d_m    = d_um  * 1e-6;
        const b_m    = b_um  * 1e-6;

        // Grid
        ctxPl.strokeStyle = '#16203a'; ctxPl.lineWidth = 1;
        ctxPl.font = '10px Space Mono'; ctxPl.fillStyle = '#8892b0';

        for (let i = 0; i <= 5; i++) {
            const gy = margin.top + (1 - i/5) * h;
            ctxPl.beginPath(); ctxPl.moveTo(margin.left, gy); ctxPl.lineTo(margin.left + w, gy); ctxPl.stroke();
            ctxPl.fillText((i/5).toFixed(1), 4, gy + 4);
        }
        for (let i = -3; i <= 3; i++) {
            const gx = margin.left + (i/3 + 1)/2 * w;
            ctxPl.beginPath(); ctxPl.moveTo(gx, margin.top); ctxPl.lineTo(gx, margin.top + h); ctxPl.stroke();
            ctxPl.fillText(`${i*5}`, gx - 6, margin.top + h + 14);
        }
        ctxPl.fillText('Posición (mm)', margin.left + w/2 - 45, margin.top + h + 30);
        ctxPl.fillText('I / I₀', 4, margin.top - 10);

        // Title
        ctxPl.fillStyle = col; ctxPl.font = '10px Space Mono';
        ctxPl.fillText(`YOUNG: b=${b_um}µm  d=${d_um}µm  λ=${wav_nm}nm`, margin.left, margin.top - 10);

        const mapX = ym => margin.left + (ym + XLIM) / (2*XLIM) * w;
        const mapY = I  => margin.top + (1 - I) * h;

        // Envelope (diffraction)
        ctxPl.beginPath(); ctxPl.strokeStyle = 'rgba(0,212,255,0.35)'; ctxPl.lineWidth = 1.5; ctxPl.setLineDash([5,4]);
        data.y_mm.forEach((ym, i) => {
            const px = mapX(ym), py = mapY(data.diff[i]);
            if (px < margin.left || px > margin.left + w) return;
            i === 0 ? ctxPl.moveTo(px, py) : ctxPl.lineTo(px, py);
        });
        ctxPl.stroke(); ctxPl.setLineDash([]);

        // Filled area
        const validPts = data.y_mm.map((ym, i) => [mapX(ym), mapY(data.I[i])]).filter(([px]) => px >= margin.left && px <= margin.left + w);
        ctxPl.beginPath();
        ctxPl.moveTo(validPts[0]?.[0] ?? margin.left, margin.top + h);
        validPts.forEach(([px, py]) => ctxPl.lineTo(px, py));
        ctxPl.lineTo(validPts[validPts.length-1]?.[0] ?? margin.left + w, margin.top + h);
        ctxPl.closePath();
        ctxPl.fillStyle = `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},0.25)`;
        ctxPl.fill();

        // Total intensity line
        ctxPl.beginPath(); ctxPl.strokeStyle = '#fff'; ctxPl.lineWidth = 1.5;
        data.y_mm.forEach((ym, i) => {
            const px = mapX(ym), py = mapY(data.I[i]);
            if (px < margin.left || px > margin.left + w) return;
            i === 0 ? ctxPl.moveTo(px, py) : ctxPl.lineTo(px, py);
        });
        ctxPl.stroke();

        // Order labels
        const max_m = Math.floor(d_m * Math.sin(0.02) / wav_m);
        ctxPl.font = 'bold 9px Space Mono';
        for (let m = -max_m; m <= max_m; m++) {
            const sin_th = (m * wav_m) / d_m;
            if (Math.abs(sin_th) >= 0.02) continue;
            const y_pos = F * (sin_th / Math.sqrt(1 - sin_th*sin_th)) * 1000;
            if (y_pos < -XLIM || y_pos > XLIM) continue;
            const beta_m = m !== 0 ? (Math.PI * b_m * sin_th) / wav_m : 0;
            const I_peak = sinc(beta_m) ** 2;
            if (I_peak < 0.05) continue;
            const px = mapX(y_pos), py = mapY(I_peak) - 10;
            ctxPl.fillStyle = '#FFD700';
            ctxPl.textAlign = 'center';
            ctxPl.fillText(`${m}`, px, py);
        }
        ctxPl.textAlign = 'left';

        // Legend
        ctxPl.font = '9px Space Mono';
        ctxPl.fillStyle = '#fff'; ctxPl.fillText('─ Total', margin.left + w - 90, margin.top + 14);
        ctxPl.fillStyle = 'rgba(0,212,255,0.7)'; ctxPl.fillText('╌ Envolvente', margin.left + w - 90, margin.top + 26);
    }

    function drawPattern(data) {
        const W = canPat.width, H = canPat.height;
        if (!W || !H) return;
        const [r,g,b] = wavToRGB(wav_nm);
        const imgData = ctxPat.createImageData(W, H);

        for (let px = 0; px < W; px++) {
            // Map pixel to y_mm
            const ym = -XLIM + (2*XLIM * px / W);
            // Find nearest point
            const idx_data = Math.round((ym + XLIM) / (2*XLIM) * (NPTS - 1));
            const I = data.I[Math.max(0, Math.min(NPTS-1, idx_data))] || 0;
            const rv = Math.round(r * I * 255);
            const gv = Math.round(g * I * 255);
            const bv = Math.round(b * I * 255);
            for (let py = 0; py < H; py++) {
                const i4 = (py * W + px) * 4;
                imgData.data[i4]   = rv;
                imgData.data[i4+1] = gv;
                imgData.data[i4+2] = bv;
                imgData.data[i4+3] = 255;
            }
        }
        ctxPat.putImageData(imgData, 0, 0);
        ctxPat.fillStyle = 'rgba(0,0,0,0.5)'; ctxPat.fillRect(0, 0, 180, 15);
        ctxPat.fillStyle = '#8892b0'; ctxPat.font = '9px Space Mono';
        ctxPat.fillText('Patrón en pantalla (±15 mm)', 4, 11);
    }

    function update() {
        const data = compute();
        drawSchematic();
        drawPlot(data);
        drawPattern(data);

        const wav_m = wav_nm*1e-9, d_m = d_um*1e-6, b_m = b_um*1e-6;
        const fringe_mm = (F * wav_m / d_m) * 1e3;
        const env_mm    = (F * wav_m / b_m) * 1e3;
        const missing   = Math.round(d_m / b_m);
        document.getElementById('infoDisplay').innerText =
            `I = sinc²(β) · cos²(γ)   β = πb·sin(θ)/λ   γ = πd·sin(θ)/λ\nFranjas: Δy = f·λ/d = ${fringe_mm.toFixed(2)} mm  |  Envolvente: ${env_mm.toFixed(2)} mm\nÓrdenes ausentes: m múltiplo de d/b = ${missing}`;
    }

    document.getElementById('wavSlider').oninput = e => {
        wav_nm = parseInt(e.target.value);
        document.getElementById('wavVal').innerText = wav_nm;
        const [r,g,b] = wavToRGB(wav_nm);
        const col = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
        e.target.style.accentColor = col;
        document.getElementById('wavLabel').style.color = col;
        update();
    };
    document.getElementById('bSlider').oninput = e => {
        b_um = parseInt(e.target.value);
        document.getElementById('bVal').innerText = b_um;
        update();
    };
    document.getElementById('dSlider').oninput = e => {
        d_um = parseInt(e.target.value);
        document.getElementById('dVal').innerText = d_um;
        update();
    };

    function resize() {
        simC.width   = simC.offsetWidth;
        canPl.width  = canPl.offsetWidth;
        canPl.height = 300;
        canPat.width  = canPat.offsetWidth;
        canPat.height = 70;
        update();
    }
    window.onresize = resize;
    requestAnimationFrame(resize);
</script>
</body>
</html>
