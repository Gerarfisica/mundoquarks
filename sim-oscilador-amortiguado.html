<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oscilador Amortiguado | Mundo Quarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050f; --bg-panel: #070d1f; --cyan: #00d4ff; --white: #eef2ff; --gray: #8892b0; --border: rgba(26, 108, 245, 0.2); }
        body { background: var(--bg); color: var(--white); font-family: 'Crimson Pro', serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; }
        h1 { grid-column: 1 / -1; font-family: 'Space Mono'; color: var(--cyan); text-align: center; margin: 10px 0; font-size: 1rem; }
        .panel-left { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 15px; height: fit-content; }
        canvas { background: #000; border-radius: 10px; width: 100%; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .freq-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--cyan); padding: 12px; text-align: center; font-family: 'Space Mono'; color: var(--cyan); margin-bottom: 15px; border-radius: 8px; font-size: 0.8rem; line-height: 1.7; }
        .btn-restart { width: 100%; padding: 12px; background: #1a6cf5; color: white; border: none; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .btn-restart:hover { background: #ff4500; }
        .plots-column { display: flex; flex-direction: column; gap: 15px; }
        .plot-canvas { height: 180px; }
        .btn-volver { grid-column: 1 / -1; color: var(--gray); text-decoration: none; font-family: 'Space Mono'; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }

        /* Selector de régimen */
        .regime-group { margin-bottom: 15px; }
        .regime-label { font-family: 'Space Mono'; font-size: 0.75rem; color: var(--cyan); margin-bottom: 8px; display: block; }
        .regime-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .regime-btn {
            background: rgba(0,212,255,0.05);
            border: 1px solid var(--border);
            color: var(--gray);
            font-family: 'Space Mono';
            font-size: 0.55rem;
            padding: 7px 3px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            line-height: 1.4;
        }
        .regime-btn:hover { border-color: var(--cyan); color: var(--white); }
        .regime-btn.active { border-color: var(--cyan); font-weight: bold; }
        .regime-btn[data-regime="sub"].active    { background: rgba(0,255,127,0.12); color: #00FF7F; border-color: #00FF7F; }
        .regime-btn[data-regime="critico"].active { background: rgba(0,212,255,0.12); color: var(--cyan); border-color: var(--cyan); }
        .regime-btn[data-regime="sobre"].active  { background: rgba(255,69,0,0.12); color: #FF4500; border-color: #FF4500; }
    </style>
</head>
<body>

<div class="container">
    <a href="fisica2.html" class="btn-volver">← VOLVER A SELECCIÓN</a>
    <h1>Oscilador Amortiguado, Crítico y Sobreamortiguado — RK4</h1>

    <div class="panel-left">
        <canvas id="simCanvas" height="220"></canvas>
        <div class="controls">
            <div id="freqDisplay" class="freq-box">ω₀ = --- rad/s &nbsp;|&nbsp; γ = --- s⁻¹</div>

            <div class="regime-group">
                <span class="regime-label">Régimen de amortiguamiento</span>
                <div class="regime-options">
                    <button class="regime-btn active" data-regime="sub">Sub-<br>amortiguado</button>
                    <button class="regime-btn" data-regime="critico">Crítico</button>
                    <button class="regime-btn" data-regime="sobre">Sobre-<br>amortiguado</button>
                </div>
            </div>

            <div class="control-group">
                <label>Masa (m) <span><span id="mVal">1.0</span> kg</span></label>
                <input type="range" id="mSlider" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label>Constante k <span><span id="kVal">5.0</span> N/m</span></label>
                <input type="range" id="kSlider" min="1.0" max="20.0" step="0.5" value="5.0">
            </div>
            <div class="control-group">
                <label>Amortiguamiento (b) <span><span id="bVal">0.5</span> kg/s</span></label>
                <input type="range" id="bSlider" min="0.0" max="20.0" step="0.1" value="0.5">
            </div>
            <button class="btn-restart" onclick="restart()">REINICIAR TODO</button>
        </div>
    </div>

    <div class="plots-column">
        <canvas id="canvasP" class="plot-canvas" height="180"></canvas>
        <canvas id="canvasV" class="plot-canvas" height="180"></canvas>
        <canvas id="canvasA" class="plot-canvas" height="180"></canvas>
    </div>
</div>

<script>
    const simC = document.getElementById('simCanvas'), ctxS = simC.getContext('2d');
    const canP = document.getElementById('canvasP'), ctxP = canP.getContext('2d');
    const canV = document.getElementById('canvasV'), ctxV = canV.getContext('2d');
    const canA = document.getElementById('canvasA'), ctxA = canA.getContext('2d');

    let m = 1.0, k = 5.0, b = 0.5;
    let x = 1.5, v = 0.0, t = 0;
    const X0 = 1.5;
    const dt = 0.016, T_MAX = 15.0;
    let history = [];

    function accel(p, vel) { return (-k * p - b * vel) / m; }

    function solveRK4() {
        let k1v = accel(x, v),                          k1x = v;
        let k2v = accel(x+0.5*dt*k1x, v+0.5*dt*k1v),   k2x = v + 0.5*dt*k1v;
        let k3v = accel(x+0.5*dt*k2x, v+0.5*dt*k2v),   k3x = v + 0.5*dt*k2v;
        let k4v = accel(x+dt*k3x,     v+dt*k3v),        k4x = v + dt*k3v;
        v += (dt/6)*(k1v + 2*k2v + 2*k3v + k4v);
        x += (dt/6)*(k1x + 2*k2x + 2*k3x + k4x);
        t += dt;
        if (t > T_MAX) { t = 0; history = []; }
        history.push({ t: t, x: x, v: v, a: accel(x, v) });
    }

    function drawPlot(canvas, ctx, dataKey, label, color, limit) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const margin = { left: 40, right: 20, top: 20, bottom: 30 };
        const w = canvas.width - margin.left - margin.right;
        const h = canvas.height - margin.top - margin.bottom;
        const midY = margin.top + h/2;

        ctx.strokeStyle = '#16203a'; ctx.lineWidth = 1;
        ctx.font = '10px Space Mono'; ctx.fillStyle = '#8892b0';

        for(let i=0; i<=10; i++) {
            let gx = margin.left + (i/10)*w;
            ctx.beginPath(); ctx.moveTo(gx, margin.top); ctx.lineTo(gx, margin.top + h); ctx.stroke();
            if(i%2===0) ctx.fillText((i * T_MAX/10).toFixed(0)+'s', gx - 5, margin.top + h + 15);
        }

        ctx.fillText(limit, 5, margin.top + 5);
        ctx.fillText('0', 5, midY + 4);
        ctx.fillText('-' + limit, 5, margin.top + h);

        ctx.beginPath(); ctx.strokeStyle = '#2a3a5a';
        ctx.moveTo(margin.left, midY); ctx.lineTo(margin.left + w, midY);
        ctx.stroke();

        ctx.fillStyle = color; ctx.fillText(label, margin.left, margin.top - 8);

        if (history.length < 2) return;
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
        history.forEach((p, i) => {
            const px = margin.left + (p.t / T_MAX) * w;
            const py = midY - (p[dataKey] * (h / (limit * 2)));
            if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();
    }

    // Resorte zigzag horizontal (una sola pared a la izquierda)
    function drawSpring(ctx, x0, y0, x1, y1) {
        const nodes = 20;
        const dx = x1 - x0, dy = y1 - y0;
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len === 0) return;
        const px = -dy/len, py = dx/len;
        const amp = 10;
        ctx.beginPath(); ctx.strokeStyle = '#4e5b7e'; ctx.lineWidth = 2;
        ctx.moveTo(x0, y0);
        for(let i = 1; i < nodes; i++) {
            const tt = i / nodes;
            const bx = x0 + dx * tt, by = y0 + dy * tt;
            const offset = (i % 2 === 0 ? amp : -amp);
            ctx.lineTo(bx + px * offset, by + py * offset);
        }
        ctx.lineTo(x1, y1);
        ctx.stroke();
    }

    function loop() {
        solveRK4();

        ctxS.clearRect(0, 0, simC.width, simC.height);
        const W = simC.width, H = simC.height;
        const wallX = 30;           // pared izquierda en px
        const anchorY = H / 2;
        const equilibriumX = W / 2; // posición de equilibrio
        const scale = 90;           // px por metro

        const massX = equilibriumX + x * scale;
        const massY = anchorY;

        // Pared izquierda
        ctxS.fillStyle = '#1a6cf5';
        ctxS.fillRect(wallX - 4, anchorY - 50, 4, 100);

        // Línea de equilibrio punteada
        ctxS.save();
        ctxS.setLineDash([4, 6]);
        ctxS.strokeStyle = 'rgba(255,255,255,0.08)';
        ctxS.lineWidth = 1;
        ctxS.beginPath();
        ctxS.moveTo(equilibriumX, anchorY - 30);
        ctxS.lineTo(equilibriumX, anchorY + 30);
        ctxS.stroke();
        ctxS.restore();

        // Resorte desde pared hasta masa
        drawSpring(ctxS, wallX, anchorY, massX, massY);

        // Masa
        ctxS.beginPath();
        ctxS.arc(massX, massY, 18, 0, Math.PI * 2);
        ctxS.fillStyle = '#00d4ff';
        ctxS.shadowBlur = 20; ctxS.shadowColor = '#00d4ff';
        ctxS.fill(); ctxS.shadowBlur = 0;

        const w0 = Math.sqrt(k / m);
        const limX = (X0 * 1.1).toFixed(1);
        const limV = (X0 * w0 * 1.1).toFixed(1);
        const limA = (X0 * w0 * w0 * 1.1).toFixed(1);

        drawPlot(canP, ctxP, 'x', 'Posición x (m)',      '#00FF7F', parseFloat(limX));
        drawPlot(canV, ctxV, 'v', 'Velocidad v (m/s)',   '#FFD700', parseFloat(limV));
        drawPlot(canA, ctxA, 'a', 'Aceleración a (m/s²)','#FF4500', parseFloat(limA));

        requestAnimationFrame(loop);
    }

    function updateFreqBox() {
        const w0 = Math.sqrt(k / m);
        const gamma = b / (2 * m);
        const wc = 2 * m * w0; // b crítico
        let regime = '';
        if (b < wc - 0.01)      regime = '● Subamortiguado';
        else if (b > wc + 0.01) regime = '● Sobreamortiguado';
        else                     regime = '● Crítico';
        document.getElementById('freqDisplay').innerText =
            `ω₀ = ${w0.toFixed(3)} rad/s  |  γ = ${gamma.toFixed(3)} s⁻¹\n${regime}`;
    }

    function restart() {
        t = 0; x = X0; v = 0; history = [];
        updateFreqBox();
    }

    // Sliders
    document.getElementById('mSlider').oninput = e => { m = parseFloat(e.target.value); document.getElementById('mVal').innerText = m.toFixed(1); restart(); };
    document.getElementById('kSlider').oninput = e => { k = parseFloat(e.target.value); document.getElementById('kVal').innerText = k.toFixed(1); restart(); };
    document.getElementById('bSlider').oninput = e => { b = parseFloat(e.target.value); document.getElementById('bVal').innerText = b.toFixed(1); restart(); };

    // Botones de régimen
    document.querySelectorAll('.regime-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.regime-btn').forEach(b2 => b2.classList.remove('active'));
            btn.classList.add('active');
            const w0 = Math.sqrt(k / m);
            const bc = 2 * m * w0; // amortiguamiento crítico
            const bSlider = document.getElementById('bSlider');
            if (btn.dataset.regime === 'sub') {
                b = Math.max(0.1, bc * 0.2);
            } else if (btn.dataset.regime === 'critico') {
                b = bc;
            } else {
                b = bc * 3.0;
            }
            // Clamp al rango del slider
            b = Math.min(20.0, Math.max(0.0, b));
            bSlider.value = b;
            document.getElementById('bVal').innerText = b.toFixed(1);
            restart();
        });
    });

    function resize() { [simC, canP, canV, canA].forEach(c => c.width = c.offsetWidth); }
    window.onresize = resize; resize();
    restart(); loop();
</script>
</body>
</html>
